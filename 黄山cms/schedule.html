    <script src="js/common.js"></script>
    <script>
        let schedulesList = [];

        function loadSchedules() {
            schedulesList = dbGet('hscms_schedules', []);
            renderSchedulesTable();
        }

        function loadTargetOptions() {
            const type = document.getElementById('schedTargetType').value;
            const action = document.getElementById('schedAction').value;
            const targetSelect = document.getElementById('schedTargetId');
            targetSelect.innerHTML = '';
            targetSelect.disabled = false;

            let filteredList = [];

            if (type === 'banner') {
                const banners = dbGet('hscms_banners', []);
                if (action === '上架') {
                    // Timer online -> select disabled banners
                    filteredList = banners.filter(b => b.status === '禁用');
                } else if (action === '下架') {
                    // Timer offline -> select enabled banners
                    filteredList = banners.filter(b => b.status === '启用' || !b.status);
                }

                filteredList.forEach(b => {
                    const option = document.createElement('option');
                    option.value = b.id;
                    option.textContent = `${b.title} (ID: ${b.id})`;
                    targetSelect.appendChild(option);
                });
            } else if (type === '专题') {
                const topics = dbGet('hscms_topics', []);
                if (action === '上架') {
                    // Timer online -> select disabled topics
                    filteredList = topics.filter(t => t.status === '禁用');
                } else if (action === '下架') {
                    // Timer offline -> select enabled topics
                    filteredList = topics.filter(t => t.status === '启用');
                }

                filteredList.forEach(t => {
                    const option = document.createElement('option');
                    option.value = t.id;
                    option.textContent = `${t.name} (ID: ${t.id})`;
                    targetSelect.appendChild(option);
                });
            }

            if (filteredList.length === 0) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = `暂无符合条件的${action === '上架' ? '未启用' : '已启用'}调度目标`;
                targetSelect.appendChild(option);
                targetSelect.disabled = true;
            }
        }

        function renderSchedulesTable() {
            const body = document.getElementById('scheduleTableBody');
            body.innerHTML = schedulesList.map(s => {
                const targetType = s.targetType || '素材';
                const targetName = s.targetName || s.assetId;
                const targetId = s.targetId || s.assetId;

                return `
                    <tr>
                        <td>
                            <span class="badge" style="background-color: #f1f5f9; color: #475569; border: 1px solid #cbd5e1;">${targetType}</span>
                        </td>
                        <td style="font-weight: 600;">
                            ${targetName}
                            <span style="font-family: 'Outfit'; font-size: 11px; color: var(--text-light); margin-left: 4px;">(${targetId})</span>
                        </td>
                        <td>
                            <span class="badge ${s.type === '上架' ? 'badge-success' : 'badge-danger'}">${s.type}</span>
                        </td>
                        <td style="font-family: 'Outfit';">${s.time}</td>
                        <td>
                            <span class="badge ${s.status === '等待中' ? 'badge-warning' : 'badge-success'}">${s.status}</span>
                        </td>
                        <td>
                            ${s.status === '等待中' ? `
                                <span class="action-link" onclick="triggerScheduleInstantly(${s.id})">立即触发</span>
                                <span class="action-link danger" onclick="deleteSchedule(${s.id})">取消</span>
                            ` : `<span style="color:var(--text-light);">已触发归档</span>`}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function saveSchedule(event) {
            event.preventDefault();
            const targetType = document.getElementById('schedTargetType').value;
            const targetIdVal = document.getElementById('schedTargetId').value;
            if (!targetIdVal) {
                showLockToast('错误：当前没有可供选择的调度目标！');
                return;
            }
            const targetId = parseInt(targetIdVal);
            const actionType = document.getElementById('schedAction').value;
            const timeRaw = document.getElementById('schedTime').value.replace('T', ' ');

            // Verify datetime is in the future
            const selectTime = new Date(document.getElementById('schedTime').value).getTime();
            const nowTime = new Date().getTime();
            if (selectTime <= nowTime) {
                showLockToast('错误：调度执行时间必须在当前时间之后！');
                return;
            }

            let targetName = '';
            if (targetType === 'banner') {
                const banners = dbGet('hscms_banners', []);
                const b = banners.find(x => x.id === targetId);
                if (!b) return;
                targetName = b.title;

                // State validation for Banners
                if (actionType === '上架' && b.status === '启用') {
                    showLockToast('只有未启用的 Banner 才可以进行定时上架！');
                    return;
                }
                if (actionType === '下架' && b.status === '禁用') {
                    showLockToast('只有启用的 Banner 才可以定时下架！');
                    return;
                }
            } else if (targetType === '专题') {
                const topics = dbGet('hscms_topics', []);
                const t = topics.find(x => x.id === targetId);
                if (!t) return;
                targetName = t.name;

                // State validation for Topics
                if (actionType === '上架' && t.status === '启用') {
                    showLockToast('只有未启用的专题才可以进行定时上架！');
                    return;
                }
                if (actionType === '下架' && t.status === '禁用') {
                    showLockToast('只有启用的专题才可以定时下架！');
                    return;
                }
            }

            const newId = schedulesList.length ? Math.max(...schedulesList.map(s => s.id)) + 1 : 1;
            schedulesList.push({
                id: newId,
                targetType,
                targetId,
                targetName,
                type: actionType,
                time: timeRaw,
                status: '等待中'
            });

            dbSave('hscms_schedules', schedulesList);

            document.getElementById('schedTime').value = '';

            showLockToast('定时上下架调度任务挂载成功！', true);
            loadSchedules();
        }

        function triggerScheduleInstantly(id) {
            const sched = schedulesList.find(s => s.id === id);
            if (!sched) return;

            const targetType = sched.targetType;
            const targetId = sched.targetId;
            const action = sched.type;

            if (targetType) {
                if (targetType === '专题') {
                    const topics = dbGet('hscms_topics', []);
                    const t = topics.find(x => x.id === targetId);
                    if (t) {
                        if (action === '上架' && t.status === '启用') {
                            showLockToast('执行失败：该专题已处于启用状态！');
                            return;
                        }
                        if (action === '下架' && t.status === '禁用') {
                            showLockToast('执行失败：该专题已处于禁用状态！');
                            return;
                        }
                        t.status = (action === '上架') ? '启用' : '禁用';
                        dbSave('hscms_topics', topics);
                    } else {
                        showLockToast('执行失败：找不到对应的专题！');
                        return;
                    }
                } else if (targetType === 'banner') {
                    const banners = dbGet('hscms_banners', []);
                    const b = banners.find(x => x.id === targetId);
                    if (b) {
                        if (action === '上架' && b.status === '启用') {
                            showLockToast('执行失败：该 Banner 已处于启用状态！');
                            return;
                        }
                        if (action === '下架' && b.status === '禁用') {
                            showLockToast('执行失败：该 Banner 已处于禁用状态！');
                            return;
                        }
                        b.status = (action === '上架') ? '启用' : '禁用';
                        dbSave('hscms_banners', banners);
                    } else {
                        showLockToast('执行失败：找不到对应的 Banner！');
                        return;
                    }
                }
            }

            sched.status = '已触发';
            dbSave('hscms_schedules', schedulesList);
            showLockToast(`调度执行成功！${sched.type}同步至前台，Redis 缓存及前台静态缓存已自动刷新。`, true);
            loadSchedules();
        }

        function deleteSchedule(id) {
            schedulesList = schedulesList.filter(s => s.id !== id);
            dbSave('hscms_schedules', schedulesList);
            showLockToast('调度任务已取消', true);
            loadSchedules();
        }

        // Init load
        loadSchedules();
        loadTargetOptions();
    </script>
</body>

</html>
