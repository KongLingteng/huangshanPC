    <script src="js/common.js"></script>
    <script>
        // 合并去重后的单一静态 DAM 全量标签池
        const DAM_TAGS = [
            "迎客松", "光明顶", "西海大峡谷", "莲花峰", "天都峰", "九龙瀑", "宏村", "呈坎", "屯溪老街", "新安江", "云谷寺", "慈光阁",
            "国画", "写意", "水墨", "日出", "云海", "冬雪", "秋色", "泼墨", "极简", "重彩", "摄影", "航拍", "复古",
            "春季", "夏季", "秋季", "冬季", "四季", "雨季", "旱季", "黄金周", "避暑"
        ];

        let tagsDb = [];

        function loadTags() {
            const raw = dbGet('hscms_tags', {});
            // 向下自愈：如果是包含地理、风格、季节的旧对象结构，解包合并并去重
            if (raw && !Array.isArray(raw)) {
                tagsDb = [
                    ...(raw.geographic || []),
                    ...(raw.style || []),
                    ...(raw.season || []),
                    ...(raw.common || [])
                ];
                tagsDb = Array.from(new Set(tagsDb));
                // 将升级后的扁平一维数组覆写存盘
                dbSave('hscms_tags', tagsDb);
            } else if (Array.isArray(raw)) {
                tagsDb = raw;
            } else {
                tagsDb = [];
            }
            
            renderTags();
        }

        // 渲染全量公共标签
        function renderTags() {
            const list = document.getElementById('tagList');
            list.innerHTML = DAM_TAGS.map(tag => {
                const isActive = tagsDb.includes(tag);
                if (isActive) {
                    return `<span class="tag-pill active" onclick="toggleTag('${tag}')">✓ ${tag}</span>`;
                } else {
                    return `<span class="tag-pill" onclick="toggleTag('${tag}')">${tag}</span>`;
                }
            }).join('');
        }

        // 点击切换标签状态
        function toggleTag(tagValue) {
            const index = tagsDb.indexOf(tagValue);

            if (index > -1) {
                // 已选择则取消
                tagsDb.splice(index, 1);
                showLockToast(`标签 [${tagValue}] 已取消选择。`, true);
            } else {
                // 未选择则加入
                tagsDb.push(tagValue);
                showLockToast(`标签 [${tagValue}] 选择成功！`, true);
            }

            dbSave('hscms_tags', tagsDb);
            renderTags();

            // 重新应用搜索过滤
            const input = document.querySelector('.tag-column-card input');
            if (input) {
                filterTags(input);
            }
        }

        // 输入搜索词实时检索过滤未选中标签
        function filterTags(inputElement) {
            const query = inputElement.value.trim().toLowerCase();
            const list = document.getElementById('tagList');
            const pills = list.querySelectorAll('.tag-pill');

            pills.forEach(pill => {
                const isSelected = pill.classList.contains('active');
                if (isSelected) {
                    pill.style.display = '';
                    return;
                }

                const text = pill.textContent.trim().toLowerCase();
                if (text.includes(query)) {
                    pill.style.display = '';
                } else {
                    pill.style.display = 'none';
                }
            });
        }

        // Init load
        loadTags();
    </script>
