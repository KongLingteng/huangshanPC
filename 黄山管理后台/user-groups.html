            <!-- MAIN WORKSPACE -->
            <main class="workspace-canvas">
                <div class="workspace-header">
                    <div class="workspace-title-section">
                        <h1>用户群组设置</h1>
                        <p>管理系统中的用户群组分类，可实现对群组的新增、编辑、删除等操作，支持与用户记录绑定。</p>
                    </div>
                </div>

                <div class="canvas-body">
                    <!-- Filters & Tools -->
                    <div class="search-row">
                        <div style="font-size: 13px; color: var(--text-muted); font-weight: 500;">
                            提示：删除群组时将进行强引用核查，若包含关联成员将予以强行拦截。
                        </div>
                        <button class="btn btn-primary" onclick="openAddGroupModal()">
                            ➕ 新增群组
                        </button>
                    </div>

                    <!-- Groups table -->
                    <div class="enterprise-card">
                        <table class="enterprise-table">
                            <thead>
                                <tr>
                                    <th>群组 ID</th>
                                    <th>群组名称</th>
                                    <th>关联人数</th>
                                    <th>群组状态</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="groupsTableBody">
                                <!-- Dynamic -->
                            </tbody>
                        </table>
                    </div>
                </div>

    <!-- MODAL: ADD/EDIT GROUP -->
    <div id="groupModal" class="modal-overlay">
        <div class="modal-card" style="max-width: 440px;">
            <div class="modal-header">
                <h3 id="groupModalTitle">新增用户群组</h3>
                <button class="modal-close-btn" onclick="closeModal('groupModal')">&times;</button>
            </div>
            <form id="groupForm" onsubmit="submitGroupForm(event)">
                <input type="hidden" id="groupId">
                <div class="modal-body">
                    <div class="form-group">
                        <label style="font-weight: 600;">群组名称</label>
                        <input type="text" id="groupName" class="form-control" required placeholder="请输入群组名称（如：核心摄影团队）">
                    </div>
                    <div class="form-group" style="margin-top: 14px;">
                        <label style="font-weight: 600;">启用状态</label>
                        <select id="groupStatus" class="form-control" style="width: 100%;">
                            <option value="启用">启用</option>
                            <option value="禁用">禁用</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer" style="margin-top: 16px;">
                    <button type="button" class="btn" onclick="closeModal('groupModal')">取消</button>
                    <button type="submit" class="btn btn-primary">确认保存</button>
                </div>
            </form>
        </div>
    </div>

    <div id="lockToast" class="toast-container">
        <svg id="lockToastIcon" class="toast-icon" viewBox="0 0 24 24"></svg>
        <span id="lockToastText"></span>
    </div>

    <script src="js/common.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            initDatabase();
            loadGroupsData();
        });

        function loadGroupsData() {
            const defaultGroups = [
                { id: 'GRP_1001', name: '官方自营账号', status: '启用', createTime: '2026-06-01' },
                { id: 'GRP_1002', name: '特邀摄影创作者', status: '启用', createTime: '2026-06-02' },
                { id: 'GRP_1003', name: '自媒体合作机构', status: '启用', createTime: '2026-06-03' }
            ];
            
            // 确保数据库存在该表
            dbGet('hscms_user_groups', defaultGroups);
            renderGroupsTable();
        }

        function renderGroupsTable() {
            const groups = dbGet('hscms_user_groups', []);
            const users = dbGet('hscms_users', []);
            const tbody = document.getElementById('groupsTableBody');
            tbody.innerHTML = '';

            if (groups.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#9ca3af; padding: 24px;">暂无用户群组数据记录</td></tr>`;
                return;
            }

            groups.forEach(g => {
                const tr = document.createElement('tr');
                
                // 动态计算该群组下的用户关联人数
                const matchedCount = users.filter(u => u.groupName === g.name).length;

                // 状态 Badge
                const statusBadge = g.status === '启用'
                    ? `<span class="badge badge-success">启用</span>`
                    : `<span class="badge" style="background-color:#e2e8f0; color:#475569;">禁用</span>`;

                tr.innerHTML = `
                    <td><code>${g.id}</code></td>
                    <td><strong style="color:#1f2937;">${g.name}</strong></td>
                    <td><strong style="color:var(--primary-color); font-size: 13.5px;">${matchedCount} 人</strong></td>
                    <td>${statusBadge}</td>
                    <td style="color:#64748b; font-size:12px;">${g.createTime}</td>
                    <td>
                        <a href="javascript:void(0)" class="action-link" onclick="openEditGroupModal('${g.id}')">编辑</a>
                        <a href="javascript:void(0)" class="action-link danger" style="margin-left: 8px;" onclick="deleteGroup('${g.id}', ${matchedCount})">删除</a>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openAddGroupModal() {
            document.getElementById('groupModalTitle').textContent = '新增用户群组';
            document.getElementById('groupId').value = '';
            document.getElementById('groupName').value = '';
            document.getElementById('groupStatus').value = '启用';
            openModal('groupModal');
        }

        function openEditGroupModal(groupId) {
            const groups = dbGet('hscms_user_groups', []);
            const g = groups.find(item => item.id === groupId);
            if (!g) return;

            document.getElementById('groupModalTitle').textContent = '修改用户群组';
            document.getElementById('groupId').value = g.id;
            document.getElementById('groupName').value = g.name;
            document.getElementById('groupStatus').value = g.status;
            openModal('groupModal');
        }

        function submitGroupForm(e) {
            e.preventDefault();
            const id = document.getElementById('groupId').value;
            const name = document.getElementById('groupName').value.trim();
            const status = document.getElementById('groupStatus').value;

            if (!name) return;

            const groups = dbGet('hscms_user_groups', []);
            
            // 校验重名 (修改时排除自身)
            const isDuplicate = groups.some(g => g.name === name && g.id !== id);
            if (isDuplicate) {
                showLockToast('群组名称已存在，请勿重复创建！', false);
                return;
            }

            if (id) {
                // 编辑保存
                const gIdx = groups.findIndex(g => g.id === id);
                if (gIdx !== -1) {
                    const oldName = groups[gIdx].name;
                    groups[gIdx].name = name;
                    groups[gIdx].status = status;
                    dbSave('hscms_user_groups', groups);

                    // 多向联动修改：若群组名有变更，需要同步更新关联了该群组的所有用户记录
                    if (oldName !== name) {
                        const users = dbGet('hscms_users', []);
                        let needSaveUsers = false;
                        users.forEach(u => {
                            if (u.groupName === oldName) {
                                u.groupName = name;
                                needSaveUsers = true;
                            }
                        });
                        if (needSaveUsers) {
                            dbSave('hscms_users', users);
                        }
                    }

                    showLockToast('群组信息更新保存成功！', true);
                }
            } else {
                // 新增
                let maxId = 1000;
                groups.forEach(g => {
                    const num = parseInt(g.id.replace('GRP_', ''));
                    if (!isNaN(num) && num > maxId) {
                        maxId = num;
                    }
                });
                const newId = 'GRP_' + (maxId + 1);
                
                const now = new Date();
                const nowStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');

                groups.push({
                    id: newId,
                    name: name,
                    status: status,
                    createTime: nowStr
                });
                dbSave('hscms_user_groups', groups);
                showLockToast('新群组已成功创建！', true);
            }

            closeModal('groupModal');
            loadGroupsData();
        }

        function deleteGroup(groupId, matchedCount) {
            // 强引用拦截校验
            if (matchedCount > 0) {
                showLockToast(`该群组下仍有绑定的用户(${matchedCount}人)，无法删除！`, false);
                return;
            }

            if (!confirm('确定要删除此用户群组吗？此操作无法撤销。')) {
                return;
            }

            const groups = dbGet('hscms_user_groups', []);
            const filtered = groups.filter(g => g.id !== groupId);
            dbSave('hscms_user_groups', filtered);
            
            showLockToast('群组物理删除成功！', true);
            loadGroupsData();
        }
    </script>
</body>
