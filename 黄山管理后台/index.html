    <style>
        /* Dashboard custom styles */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .dashboard-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dashboard-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.04);
            border-color: var(--primary-color);
        }
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .card-icon svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        .card-content {
            display: flex;
            flex-direction: column;
        }
        .card-value {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
            line-height: 1.2;
        }
        .card-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        @media (max-width: 900px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
        .chart-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
        }
        .chart-legend {
            display: flex;
            gap: 12px;
            font-size: 11px;
            color: var(--text-muted);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .chart-body {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

    <script>
        function updateDashboardMetrics() {
            // Load LocalStorage datasets
            const posts = dbGet('hscms_ugc_posts', []);
            const assets = dbGet('hscms_asset_submissions', []);
            const withdrawals = dbGet('hscms_withdrawals', []);
            const qualifications = dbGet('hscms_qualifications', []);

            // Calculations
            const pendingPosts = posts.filter(p => p.status === '正常').length; // or waiting action
            const pendingAssets = assets.filter(a => a.status === '待审核').length;
            const pendingWithdrawals = withdrawals.filter(w => w.status === '待审批').length;
            const pendingQualifications = qualifications.filter(q => q.status === '待审核').length;

            document.getElementById('ugcCount').textContent = pendingPosts;
            document.getElementById('assetCount').textContent = pendingAssets;
            document.getElementById('financeCount').textContent = pendingWithdrawals;
            document.getElementById('qualificationCount').textContent = pendingQualifications;

            // Render active todo list
            const todoBody = document.getElementById('todoTableBody');
            todoBody.innerHTML = '';

            let todos = [];
            
            assets.filter(a => a.status === '待审核').forEach(a => {
                todos.push({
                    type: '版权资产审核',
                    desc: `作者【${a.author}】提报了作品《${a.title}》，SHA-256指纹待校验并申领DCI凭证。`,
                    status: '待审核',
                    link: 'asset-audit.html'
                });
            });

            withdrawals.filter(w => w.status === '待审批').forEach(w => {
                todos.push({
                    type: '提现打款审批',
                    desc: `供稿人【${w.user}】申请提现 ${w.amount.toFixed(2)} 元，支付账户：${w.account}。`,
                    status: '待打款',
                    link: 'finance.html'
                });
            });

            qualifications.filter(q => q.status === '待审核').forEach(q => {
                todos.push({
                    type: '供稿资质核验',
                    desc: `账号【${q.applicant}】提交了【${q.type}】资质入驻申请，证件代码: ${q.idNumber}。`,
                    status: '待审核',
                    link: 'user-audit.html'
                });
            });

            if (todos.length === 0) {
                todoBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#9ca3af; padding: 24px;">暂无需要处理的紧急待办事项。系统状态良好！</td></tr>`;
            } else {
                todos.slice(0, 5).forEach(t => {
                    const tr = document.createElement('tr');
                    let badgeClass = 'badge-warning';
                    if (t.status === '待打款') badgeClass = 'badge-success';
                    
                    tr.innerHTML = `
                        <td><strong>${t.type}</strong></td>
                        <td style="color:#475569;">${t.desc}</td>
                        <td><span class="badge ${badgeClass}">${t.status}</span></td>
                        <td><a href="${t.link}" class="action-link">立即处理</a></td>
                    `;
                    todoBody.appendChild(tr);
                });
            }
        }

        // Init page
        updateDashboardMetrics();
    </script>
