<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄山运营管理系统 - 用户申请下架通知</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
            background: #ffffff;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            align-items: flex-end;
        }
        .search-col {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .search-col label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
        }
        .pagination-btn {
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #374151;
            transition: all 0.2s ease;
        }
        .pagination-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .pagination-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #ffffff;
        }
        .pagination-btn:disabled {
            background: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
            border-color: var(--border-color);
        }
    </style>
</head>

                    </svg>

                <span class="platform-title">黄山运营管理后台</span>
            </div>

            <div class="header-right">

                </div>
            </div>
        </header>

        <div class="viewport-main">
            <!-- PRIMARY LEFT SIDEBAR -->

                <div class="nav-group-top">
                    <a href="index.html" class="nav-item">

                        <span>首页</span>

                    <a href="ugc.html" class="nav-item">
                        <svg viewBox="0 0 24 24"><path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h11l4 4V7c0-.55-.45-1-1-1zm-4 6V3c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14l4-4h10c.55 0 1-.45 1-1z"/></svg>
                        <span>社区运营</span>

                    <a href="asset-audit.html" class="nav-item active">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>

                    <a href="finance.html" class="nav-item">

                    </a>
                    <a href="orders.html" class="nav-item">

                        <span>订单</span>
                    </a>
                    <a href="contracts.html" class="nav-item">
                        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                        <span>合同配置</span>
                    </a>
                    <a href="settings.html" class="nav-item">
                        <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73(a1.69)-.98l.38-2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
                        <span>设置</span>
                    </a>
                </div>
            </aside>

            <!-- SUB SIDEBAR (MIDDLE COLUMN) -->
            <aside class="sub-sidebar">
                <div class="sub-sidebar-title">
                    <span>资产确权</span>
                </div>
                <ul class="sub-nav-list">
                    <li class="sub-nav-item" id="tabPendingNav">
                        <a href="asset-audit.html">
                            待审核列表

                    </li>
                    <li class="sub-nav-item" id="tabApprovedNav">
                        <a href="asset-audit.html?tab=approved">
                            确权历史

                    <li class="sub-nav-item" id="tabRejectedNav">

                            已驳回记录
                        </a>
                    </li>

                        <a href="material-library.html">
                            素材库
                        </a>
                    </li>
                    <li class="sub-nav-item active" id="tabTakeDownNav">
                        <a href="take-down-requests.html">

                        </a>
                    </li>
                </ul>
            </aside>

            <!-- MAIN WORKSPACE -->
            <main class="workspace-canvas" style="overflow-y: auto; padding: 24px;">
                <div class="workspace-header" style="margin-bottom: 20px;">
                    <div class="workspace-title-section">
                        <h1>用户申请下架通知</h1>
                        <p>查阅并管理供稿人用户提报的数字资产下架申请，查核其申请事由并予以确认。</p>
                    </div>
                </div>

                <div class="canvas-body">
                    <!-- Filters -->
                    <div class="search-row">
                        <div class="search-col">
                            <label>检索关键词</label>
                            <input type="text" id="filterKeyword" class="form-control" style="width:220px;" placeholder="素材名称/作者名/原素材ID...">
                        </div>
                        <div class="search-col">
                            <label>通知状态</label>
                            <select id="filterStatus" class="form-control" style="width:120px;">
                                <option value="全部">全部状态</option>
                                <option value="未读">未读</option>
                                <option value="已读">已读</option>
                            </select>
                        </div>
                        <div class="search-col" style="flex-direction:row; gap:8px;">
                            <button class="btn btn-primary" onclick="searchRequests()">查询</button>
                            <button class="btn" onclick="resetSearch()">重置</button>
                        </div>
                    </div>

                    <!-- Requests Table -->
                    <div class="enterprise-card">
                        <table class="enterprise-table">
                            <thead>
                                <tr>
                                    <th>记录 ID</th>
                                    <th>素材 ID</th>
                                    <th style="width: 25%;">下架素材名称</th>
                                    <th>提报作者</th>
                                    <th style="width: 25%;">下架理由</th>
                                    <th>申请时间</th>
                                    <th>查阅状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <!-- Dynamic -->
                            </tbody>
                        </table>

                        <!-- Pagination -->
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding:12px 16px; border-top:1px solid var(--border-color);">
                            <div style="font-size:12px; color:var(--text-muted);" id="pageInfo">
                                共 0 条，第 1/1 页
                            </div>
                            <div class="pagination-buttons" id="paginationButtons" style="display:flex; gap:6px;">
                                <!-- Dynamic -->
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- TOASTS -->
    <div id="lockToast" class="toast-container">
        <svg id="lockToastIcon" class="toast-icon" viewBox="0 0 24 24"></svg>
        <span id="lockToastText"></span>
    </div>

    <script src="js/common.js"></script>
    <script>
        let curPage = 1;
        const pageSize = 5;
        let filteredRequests = [];

        window.addEventListener('DOMContentLoaded', () => {
            initDatabase();
            loadRequests();
        });

        function loadRequests() {
            const defaultRequests = [
                { id: 'TDR_1001', assetId: 'SUB_8003', assetTitle: '独家黄山导游手绘路线图（矢量PDF）', author: '黄山行者', reason: '商用版使用授权合同已到期，申请平台下架原素材。', submitTime: '2026-06-08 09:00:00', status: '未读' },
                { id: 'TDR_1002', assetId: 'SUB_8004', assetTitle: '云谷寺秋色全景图', author: '徽风文化传媒', reason: '作品版权将转售于第三方机构，应第三方要求在平台申请下架。', submitTime: '2026-06-08 09:30:00', status: '未读' }
            ];
            const raw = dbGet('hscms_take_down_requests', defaultRequests);
            filteredRequests = raw;
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const totalRecords = filteredRequests.length;
            const totalPages = Math.ceil(totalRecords / pageSize) || 1;

            if (curPage > totalPages) curPage = totalPages;

            const startIdx = (curPage - 1) * pageSize;
            const endIdx = Math.min(startIdx + pageSize, totalRecords);
            const pageRecords = filteredRequests.slice(startIdx, endIdx);

            document.getElementById('pageInfo').textContent = `共 ${totalRecords} 条记录，当前第 ${curPage}/${totalPages} 页`;
            renderPagination(totalPages);

            if (pageRecords.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#9ca3af; padding: 24px;">未检索到符合条件的下架申请记录！</td></tr>`;
                return;
            }

            pageRecords.forEach(r => {
                const tr = document.createElement('tr');
                const statusBadge = r.status === '未读'
                    ? '<span class="badge badge-warning">未读</span>'
                    : '<span class="badge badge-success" style="background:#e2e8f0; color:#475569;">已读</span>';

                const actionBtn = r.status === '未读'
                    ? `<a href="javascript:void(0)" class="action-link" onclick="markAsRead('${r.id}')">已读</a>`
                    : ``;

                tr.innerHTML = `
                    <td><code>${r.id}</code></td>
                    <td><code>${r.assetId}</code></td>
                    <td><strong style="color:#1f2937;">${r.assetTitle}</strong></td>
                    <td><span style="font-weight:500; color:#374151;">${r.author}</span></td>
                    <td style="color:#4b5563; font-size:12.5px;" title="${r.reason}">${r.reason}</td>
                    <td style="color:#64748b; font-size:12px;">${r.submitTime}</td>
                    <td>${statusBadge}</td>
                    <td>${actionBtn}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('paginationButtons');
            container.innerHTML = '';

            const prevBtn = document.createElement('button');
            prevBtn.className = 'pagination-btn';
            prevBtn.textContent = '上一页';
            prevBtn.disabled = curPage === 1;
            prevBtn.onclick = () => {
                curPage--;
                renderTable();
            };
            container.appendChild(prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = `pagination-btn ${curPage === i ? 'active' : ''}`;
                btn.textContent = i;
                btn.onclick = () => {
                    curPage = i;
                    renderTable();
                };
                container.appendChild(btn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = 'pagination-btn';
            nextBtn.textContent = '下一页';
            nextBtn.disabled = curPage === totalPages;
            nextBtn.onclick = () => {
                curPage++;
                renderTable();
            };
            container.appendChild(nextBtn);
        }

        function searchRequests() {
            const kw = document.getElementById('filterKeyword').value.trim().toLowerCase();
            const status = document.getElementById('filterStatus').value;

            const raw = dbGet('hscms_take_down_requests', []);
            filteredRequests = raw.filter(r => {
                const matchesKw = !kw || 
                    r.assetTitle.toLowerCase().includes(kw) || 
                    r.author.toLowerCase().includes(kw) || 
                    r.assetId.toLowerCase().includes(kw) || 
                    r.id.toLowerCase().includes(kw);
                const matchesStatus = status === '全部' || r.status === status;
                return matchesKw && matchesStatus;
            });

            curPage = 1;
            renderTable();
        }

        function resetSearch() {
            document.getElementById('filterKeyword').value = '';
            document.getElementById('filterStatus').value = '全部';
            loadRequests();
            curPage = 1;
        }

        function markAsRead(id) {
            const raw = dbGet('hscms_take_down_requests', []);
            const idx = raw.findIndex(r => r.id === id);
            if (idx !== -1) {
                raw[idx].status = '已读';
                dbSave('hscms_take_down_requests', raw);
                showLockToast(`已将通知 ${id} 标记为已读`, true);
                
                // 同步全局铃铛红点
                checkTakeDownNotifications();
                
                // 维持当前检索过滤状态
                const kw = document.getElementById('filterKeyword').value.trim().toLowerCase();
                const status = document.getElementById('filterStatus').value;
                filteredRequests = raw.filter(r => {
                    const matchesKw = !kw || 
                        r.assetTitle.toLowerCase().includes(kw) || 
                        r.author.toLowerCase().includes(kw) || 
                        r.assetId.toLowerCase().includes(kw) || 
                        r.id.toLowerCase().includes(kw);
                    const matchesStatus = status === '全部' || r.status === status;
                    return matchesKw && matchesStatus;
                });

                renderTable();
            }
        }
    </script>
</body>
</html>
