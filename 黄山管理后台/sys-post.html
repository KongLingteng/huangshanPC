    <style>
        /* Table Search Styling */
        .search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
            background: #ffffff;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            align-items: flex-end;
        }
        .search-col {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .search-col label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Toolbar Styling */
        .toolbar-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .toolbar-left {
            display: flex;
            gap: 8px;
        }
        .toolbar-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .tool-btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 1px solid var(--border-color);
            background: #ffffff;
            border-radius: 6px;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
        }
        .tool-btn-icon:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .tool-btn-icon svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Switch Custom Toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .3s;
            border-radius: 22px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--primary-color);
        }
        input:checked + .slider:before {
            transform: translateX(18px);
        }

        /* Pagination buttons styling */
        .pagination-btn {
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #374151;
            transition: all 0.2s ease;
        }
        .pagination-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .pagination-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #ffffff;
        }
        .pagination-btn:disabled {
            background: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
            border-color: var(--border-color);
        }

        /* Small action buttons in column */
        .action-icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 4px;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 2px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        .action-icon-btn:hover {
            background: #e2e8f0;
            color: var(--primary-color);
        }
        .action-icon-btn.danger:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fecaca;
        }
        .action-icon-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Form styling */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 12.5px;
            font-weight: 600;
            color: #334155;
        }
    </style>
</head>

    <script>
        // State variables
        let curPage = 1;
        let pageSize = 10;
        let allPosts = [];
        let filteredPosts = [];

        // Predefined Cold-start dataset
        const DEFAULT_POSTS = [
            { postId: 'post_ceo', postName: '董事长', postCode: 'ceo', postSort: 1, status: '正常', createTime: '2026-03-24 20:56:24' },
            { postId: 'post_se', postName: '项目经理', postCode: 'se', postSort: 2, status: '正常', createTime: '2026-03-24 20:56:24' },
            { postId: 'post_hr', postName: '人力资源', postCode: 'hr', postSort: 3, status: '正常', createTime: '2026-03-24 20:56:24' },
            { postId: 'post_user', postName: '普通员工', postCode: 'user', postSort: 4, status: '正常', createTime: '2026-03-24 20:56:24' }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            initDatabase();
            loadPostsData();

            // Sync bell notification
            if (typeof checkTakeDownNotifications === 'function') {
                checkTakeDownNotifications();
            }
        });

        // Hide/Show Search section
        function toggleSearchRow() {
            const row = document.querySelector('.search-row');
            if (row) {
                row.style.display = row.style.display === 'none' ? 'flex' : 'none';
            }
        }

        // Fetch posts from database
        function loadPostsData() {
            allPosts = dbGet('hscms_posts', DEFAULT_POSTS);
            filteredPosts = [...allPosts];
            
            // Sort by sort field
            filteredPosts.sort((a,b) => a.postSort - b.postSort);

            curPage = 1;
            loadPostsTable();
        }

        // Render table
        function loadPostsTable() {
            const tbody = document.getElementById('postTableBody');
            tbody.innerHTML = '';

            const total = filteredPosts.length;
            const totalPages = Math.ceil(total / pageSize) || 1;

            if (curPage > totalPages) curPage = totalPages;

            const start = (curPage - 1) * pageSize;
            const end = Math.min(start + pageSize, total);
            const pageData = filteredPosts.slice(start, end);

            document.getElementById('pageInfo').textContent = `共 ${total} 条，当前第 ${curPage}/${totalPages} 页`;
            document.getElementById('gotoPageInput').max = totalPages;
            renderPaginationButtons(totalPages);

            if (pageData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#9ca3af; padding:24px;">暂无匹配的岗位管理数据！</td></tr>`;
                updateToolbarState();
                return;
            }

            pageData.forEach(p => {
                const tr = document.createElement('tr');
                const isChecked = p.status === '正常' ? 'checked' : '';

                tr.innerHTML = `
                    <td style="text-align:center;">
                        <input type="checkbox" name="postCheckRow" value="${p.postId}" onchange="updateToolbarState()">
                    </td>
                    <td><strong style="color:#1f2937;">${p.postName}</strong></td>
                    <td><code>${p.postCode}</code></td>
                    <td style="text-align:center;">${p.postSort}</td>
                    <td style="text-align:center;">
                        <label class="switch">
                            <input type="checkbox" ${isChecked} onchange="togglePostStatus('${p.postId}', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td style="font-size:12px; color:#64748b;">${p.createTime}</td>
                    <td style="text-align:center;">
                        <button class="action-icon-btn" onclick="openEditPostModal('${p.postId}')" title="修改岗位">
                            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        </button>
                        <button class="action-icon-btn danger" onclick="deleteSinglePost('${p.postId}')" title="删除岗位">
                            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('checkAll').checked = false;
            updateToolbarState();
        }

        // Render Pagination buttons list
        function renderPaginationButtons(totalPages) {
            const container = document.getElementById('paginationButtons');
            container.innerHTML = '';

            const prev = document.createElement('button');
            prev.className = 'pagination-btn';
            prev.textContent = '‹';
            prev.disabled = curPage === 1;
            prev.onclick = () => {
                curPage--;
                loadPostsTable();
            };
            container.appendChild(prev);

            let startPage = Math.max(1, curPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            if (endPage - startPage < 4) {
                startPage = Math.max(1, endPage - 4);
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = `pagination-btn ${curPage === i ? 'active' : ''}`;
                btn.textContent = i;
                btn.onclick = () => {
                    curPage = i;
                    loadPostsTable();
                };
                container.appendChild(btn);
            }

            const next = document.createElement('button');
            next.className = 'pagination-btn';
            next.textContent = '›';
            next.disabled = curPage === totalPages;
            next.onclick = () => {
                curPage++;
                loadPostsTable();
            };
            container.appendChild(next);
        }

        function changePageSize(size) {
            pageSize = parseInt(size);
            curPage = 1;
            loadPostsTable();
        }

        function gotoPage() {
            const input = document.getElementById('gotoPageInput');
            let val = parseInt(input.value);
            const totalPages = Math.ceil(filteredPosts.length / pageSize) || 1;
            if (isNaN(val) || val < 1) val = 1;
            if (val > totalPages) val = totalPages;
            curPage = val;
            input.value = val;
            loadPostsTable();
        }

        // Check All checkboxes control
        function toggleCheckAll(checked) {
            const boxes = document.getElementsByName('postCheckRow');
            boxes.forEach(b => b.checked = checked);
            updateToolbarState();
        }

        // Sync Toolbar State
        function updateToolbarState() {
            const boxes = document.getElementsByName('postCheckRow');
            let selectedCount = 0;
            boxes.forEach(b => {
                if (b.checked) selectedCount++;
            });

            document.getElementById('btnBulkEdit').disabled = selectedCount !== 1;
            document.getElementById('btnBulkDelete').disabled = selectedCount === 0;
        }

        // Switch trigger
        function togglePostStatus(postId, isChecked) {
            const index = allPosts.findIndex(p => p.postId === postId);
            if (index !== -1) {
                const targetStatus = isChecked ? '正常' : '停用';
                allPosts[index].status = targetStatus;
                dbSave('hscms_posts', allPosts);
                showLockToast(`岗位 “${allPosts[index].postName}” 状态已切换为 ${targetStatus}`, true);
            }
        }

        // Search Filter
        function searchPosts() {
            const keyword = document.getElementById('searchKeyword').value.trim().toLowerCase();
            const status = document.getElementById('searchStatus').value;

            filteredPosts = allPosts.filter(p => {
                const matchKeyword = !keyword || 
                                     p.postName.toLowerCase().includes(keyword) || 
                                     p.postCode.toLowerCase().includes(keyword);
                const matchStatus = !status || p.status === status;
                return matchKeyword && matchStatus;
            });

            filteredPosts.sort((a,b) => a.postSort - b.postSort);
            curPage = 1;
            loadPostsTable();
        }

        // Reset Filter
        function resetSearch() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('searchStatus').value = '';

            filteredPosts = [...allPosts];
            filteredPosts.sort((a,b) => a.postSort - b.postSort);
            curPage = 1;
            loadPostsTable();
        }



        // Open Add Modal
        function openAddPostModal() {
            document.getElementById('postModalTitle').textContent = '新增岗位';
            document.getElementById('editPostId').value = '';

            document.getElementById('formPostName').value = '';
            document.getElementById('formPostCode').value = '';
            document.getElementById('formPostSort').value = allPosts.length + 1;
            document.getElementById('formStatus').value = '正常';

            openModal('postModal');
        }

        // Open Edit Modal
        function openEditPostModal(postId) {
            const p = allPosts.find(x => x.postId === postId);
            if (!p) return;

            document.getElementById('postModalTitle').textContent = '修改岗位';
            document.getElementById('editPostId').value = p.postId;

            document.getElementById('formPostName').value = p.postName;
            document.getElementById('formPostCode').value = p.postCode;
            document.getElementById('formPostSort').value = p.postSort;
            document.getElementById('formStatus').value = p.status;

            openModal('postModal');
        }

        // Open Edit from Selected Toolbar
        function openEditSelectedPost() {
            const boxes = document.getElementsByName('postCheckRow');
            let targetId = null;
            boxes.forEach(b => {
                if (b.checked) targetId = b.value;
            });
            if (targetId) {
                openEditPostModal(targetId);
            }
        }

        // Submit Form Add/Edit
        function submitPostForm(e) {
            e.preventDefault();
            const editId = document.getElementById('editPostId').value;
            const postName = document.getElementById('formPostName').value.trim();
            const postCode = document.getElementById('formPostCode').value.trim();
            const postSort = parseInt(document.getElementById('formPostSort').value) || 1;
            const status = document.getElementById('formStatus').value;

            // Unique check code
            const isCodeExists = allPosts.some(p => p.postCode.toLowerCase() === postCode.toLowerCase() && p.postId !== editId);
            if (isCodeExists) {
                showLockToast(`岗位编码 “${postCode}” 已存在，请使用其他唯一编码！`);
                return;
            }

            const now = new Date();
            const curTimeStr = now.getFullYear() + '-' + 
                               String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                               String(now.getDate()).padStart(2, '0') + ' ' + 
                               String(now.getHours()).padStart(2, '0') + ':' + 
                               String(now.getMinutes()).padStart(2, '0') + ':' + 
                               String(now.getSeconds()).padStart(2, '0');

            if (editId) {
                // Edit
                const index = allPosts.findIndex(x => x.postId === editId);
                if (index !== -1) {
                    allPosts[index].postName = postName;
                    allPosts[index].postCode = postCode;
                    allPosts[index].postSort = postSort;
                    allPosts[index].status = status;

                    dbSave('hscms_posts', allPosts);
                    showLockToast('岗位修改已顺利保存！', true);
                }
            } else {
                // Add
                const newId = 'post_' + Math.random().toString(36).substr(2, 9);
                const newPost = {
                    postId: newId,
                    postName: postName,
                    postCode: postCode,
                    postSort: postSort,
                    status: status,
                    createTime: curTimeStr
                };
                allPosts.push(newPost);
                dbSave('hscms_posts', allPosts);
                showLockToast('新岗位创建成功！', true);
            }

            closeModal('postModal');
            loadPostsData();
        }

        // Delete Single Record
        function deleteSinglePost(postId) {
            const target = allPosts.find(x => x.postId === postId);
            if (!target) return;

            // Integrity checks
            const users = dbGet('hscms_users', DEFAULT_USERS);
            const isAssociated = users.some(u => u.post === target.postName);
            if (isAssociated) {
                showLockToast(`岗位 “${target.postName}” 下仍有系统用户存在，禁止直接删除！`);
                return;
            }

            if (confirm(`确定要永久删除岗位 “${target.postName}” 吗？`)) {
                allPosts = allPosts.filter(x => x.postId !== postId);
                dbSave('hscms_posts', allPosts);
                showLockToast('岗位已删除！', true);
                loadPostsData();
            }
        }

        // Delete Selected Multiple Records
        function deleteSelectedPosts() {
            const boxes = document.getElementsByName('postCheckRow');
            const targetIds = [];
            boxes.forEach(b => {
                if (b.checked) targetIds.push(b.value);
            });

            if (targetIds.length === 0) return;

            const users = dbGet('hscms_users', DEFAULT_USERS);
            let blockedNames = [];

            // Verify each
            targetIds.forEach(id => {
                const target = allPosts.find(x => x.postId === id);
                if (target) {
                    const isAssociated = users.some(u => u.post === target.postName);
                    if (isAssociated) {
                        blockedNames.push(target.postName);
                    }
                }
            });

            if (blockedNames.length > 0) {
                showLockToast(`岗位 “${blockedNames.join(', ')}” 下仍有关联用户，禁止删除！`);
                return;
            }

            if (confirm(`确定要永久删除这 ${targetIds.length} 个选中的岗位吗？`)) {
                allPosts = allPosts.filter(x => !targetIds.includes(x.postId));
                dbSave('hscms_posts', allPosts);
                showLockToast('选中的岗位已全部顺利物理删除！', true);
                loadPostsData();
            }
        }
    </script>
</body>
</html>
