                    <!-- Search Filters -->

    <div id="usageModal" class="modal-overlay">

            <div class="modal-header">
                <h3>关联素材用途配置</h3>
                <button class="modal-close-btn" onclick="closeModal('usageModal')">&times;</button>
            </div>
            <form id="usageForm" onsubmit="submitUsageLink(event)">
                <input type="hidden" id="usageAssetId">
                <div class="modal-body" style="max-height: 400px; overflow-y: auto;">
                    <div class="form-group" style="margin-bottom: 16px;">
                        <label style="font-weight:600; font-size:12.5px; margin-bottom: 6px; display:block;">选择用途配置模板</label>
                        <select id="modalUsageTemplateSelect" class="form-control" onchange="onTemplateChange()" style="width: 100%;">
                            <!-- Dynamic templates list -->
                        </select>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <p style="font-size:12px; color:#64748b; margin: 0;">请选择适合该素材的用途（可多选）：</p>
                        <label style="font-size:12px; color:var(--primary-color); cursor:pointer; display:flex; align-items:center; gap:4px; margin:0; user-select:none;">
                            <input type="checkbox" id="selectAllUsage" onchange="toggleSelectAllUsage(this)">
                            <span>一键全选</span>
                        </label>

                    <div id="usageOptionsWrapper" style="display: flex; flex-direction: column; gap: 16px;">
                        <!-- Dynamic Checkboxes Grouped by Parent Category -->
                    </div>
                </div>
                <div class="modal-footer" style="margin-top: 16px;">
                    <button type="button" class="btn" onclick="closeModal('usageModal')">取消</button>
                    <button type="submit" class="btn btn-primary">确认关联</button>

    <div id="lockToast" class="toast-container">

    <script src="js/common.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            initDatabase();
            loadMaterialsList();
        });

        function loadMaterialsList() {
            const keyword = document.getElementById('assetKeyword').value.trim().toLowerCase();
            const saleStatus = document.getElementById('searchSaleStatus').value;
            const assetType = document.getElementById('searchAssetType').value;

            const assets = dbGet('hscms_asset_submissions', []);
            // Only show approved assets (status === '审核成功')
            let filtered = assets.filter(a => a.status === '审核成功');

            // 兜底自愈机制：如果审核成功的资产没有关联用途，则默认其关联首个价格模板下的全量用途并写回 LocalStorage
            let hasChanges = false;
            const templates = dbGet('hscms_settings_usage_templates', []);
            let allUsages = [];
            let defaultTemplateId = null;

            if (templates.length > 0) {
                defaultTemplateId = templates[0].id;
                const usageConfig = templates[0].usageConfig || [];
                usageConfig.forEach(cat => {
                    if (cat.specs && cat.specs.length > 0) {
                        cat.specs.forEach(spec => {
                            const specName = (typeof spec === 'object' && spec !== null) ? (spec.name || '') : String(spec);
                            if (specName) allUsages.push(specName);
                        });
                    }
                });
            }
            const allUsagesStr = allUsages.join(', ');

            assets.forEach(a => {
                if (a.status === '审核成功' && (!a.linkedUsage || a.linkedUsage.trim() === '')) {
                    a.linkedTemplateId = defaultTemplateId;
                    a.linkedUsage = allUsagesStr;
                    hasChanges = true;
                }
                // 素材星级自愈，默认 3 星级
                if (!a.starLevel) {
                    a.starLevel = 3;
                    hasChanges = true;
                }
            });

            if (hasChanges) {
                dbSave('hscms_asset_submissions', assets);
                filtered = assets.filter(a => a.status === '审核成功');
            }

            // Apply Keyword filter
            if (keyword) {
                filtered = filtered.filter(a => 
                    a.id.toLowerCase().includes(keyword) || 
                    a.title.toLowerCase().includes(keyword) || 
                    a.author.toLowerCase().includes(keyword) ||
                    a.hash.toLowerCase().includes(keyword)
                );
            }

            // Apply sale status filter
            if (saleStatus !== '全部') {
                filtered = filtered.filter(a => {
                    const onSale = a.onSale === true;
                    return saleStatus === '已上架' ? onSale : !onSale;
                });
            }

            // Apply asset type filter
            if (assetType !== '全部') {
                filtered = filtered.filter(a => {
                    const t = a.title;
                    if (assetType === '图片') {
                        return t.includes('图') || t.includes('照片') || t.includes('摄影');
                    } else if (assetType === '视频') {
                        return t.includes('视频') || t.includes('镜头') || t.includes('片') || t.includes('影');
                    } else if (assetType === '文章') {
                        return t.includes('书') || t.includes('路线图') || t.includes('pdf') || t.includes('文章') || t.includes('手册') || t.includes('图（');
                    }
                    return true;
                });
            }

            const tbody = document.getElementById('materialsTableBody');
            tbody.innerHTML = '';

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:#9ca3af; padding: 24px;">素材库内暂无已审核通过的素材记录</td></tr>`;
                return;
            }

            filtered.forEach(a => {
                const tr = document.createElement('tr');
                
                // Proof Mode Badge
                let proofModeBadge = '';
                if (a.needProof === '是') {
                    proofModeBadge = `<span class="badge" style="background-color: rgba(2, 132, 199, 0.1); color: #0284c7; border: 1px solid rgba(2, 132, 199, 0.2); font-weight:600;">确权上架</span>`;
                } else {
                    proofModeBadge = `<span class="badge" style="background-color: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1;">常规上架</span>`;
                }

                // DCI Badge
                let dciLayout = `<span style="color:#9ca3af; font-size:12px;">-</span>`;
                if (a.dciCode && a.dciCode !== '-') {
                    dciLayout = `<code class="hash-code" style="color:#1677ff;">${a.dciCode}</code>`;
                }

                // Show linked usages
                let usageTagsHtml = '';
                if (a.linkedUsage && a.linkedUsage !== '') {
                    const usages = a.linkedUsage.split(', ');
                    let visibleTags = '';
                    if (usages.length <= 3) {
                        visibleTags = usages.map(u => `<span class="badge" style="background-color: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); font-size: 10px; padding: 2px 6px; white-space: nowrap;">${u}</span>`).join('');
                    } else {
                        visibleTags = usages.slice(0, 3).map(u => `<span class="badge" style="background-color: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); font-size: 10px; padding: 2px 6px; white-space: nowrap;">${u}</span>`).join('') +
                                      `<span class="badge" style="background-color: rgba(100, 116, 139, 0.1); color: #64748b; border: 1px solid rgba(100, 116, 139, 0.2); font-size: 10px; padding: 2px 6px; white-space: nowrap; cursor: help;" title="${a.linkedUsage}">等${usages.length}项...</span>`;
                    }
                    usageTagsHtml = `<div style="margin-top: 6px; display: flex; flex-wrap: nowrap; align-items: center; gap: 4px; overflow: hidden;">` + 
                        visibleTags +
                        `</div>`;
                } else {
                    usageTagsHtml = `<div style="margin-top: 6px;"><span style="color: #94a3b8; font-size: 11px; font-style: italic;">未关联用途</span></div>`;
                }

                // 获取已关联的模板名称
                let templateName = '-';
                if (a.linkedTemplateId) {
                    const matchedTemplate = templates.find(t => t.id === a.linkedTemplateId);
                    if (matchedTemplate) {
                        templateName = matchedTemplate.name;
                    }
                } else if (templates.length > 0) {
                    // 自愈默认展示第一个模板名
                    templateName = templates[0].name;
                }

                // Render Star Level
                const starCount = a.starLevel || 3;
                const starLayout = `<span style="font-size:12.5px; font-weight: 600; color:#eab308;" title="${starCount}星素材">${starCount}星</span>`;

                // Sale status Badge
                const onSale = a.onSale === true;
                let saleBadge = onSale 
                    ? `<span class="badge badge-success">已上架</span>` 
                    : `<span class="badge" style="background-color: #e2e8f0; color: #475569;">已下架</span>`;

                // Actions Column
                let actionBtn = '';
                if (onSale) {
                    actionBtn = `
                        <a href="javascript:void(0)" class="action-link danger" onclick="toggleSaleStatus('${a.id}', false)">下架</a>
                    `;
                } else {
                    actionBtn = `
                        <a href="javascript:void(0)" class="action-link" onclick="toggleSaleStatus('${a.id}', true)">上架</a>
                    `;
                }

                actionBtn += `
                    <a href="javascript:void(0)" class="action-link" style="margin-left: 8px;" onclick="openLinkUsageModal('${a.id}')">关联用途</a>
                    <a href="asset-detail.html?id=${a.id}" class="action-link" style="margin-left: 8px;" target="_blank">详情</a>
                `;

                tr.innerHTML = `
                    <td>
                        <div style="font-weight:600; color:#1f2937;">${a.title}</div>
                        <div class="meta-detail-row">
                            <span>ID: <code>${a.id}</code></span>
                            <span>指纹 SHA-256: <code class="hash-code" onclick="navigator.clipboard.writeText('${a.hash}'); alert('哈希值已复制到剪贴板！');">${a.hash.substring(0, 16)}...</code></span>
                        </div>
                    </td>
                    <td>
                        <strong style="color:#334155;">${a.author}</strong>
                        <div style="font-size:11px; color:#64748b;">${a.authorType}创作者</div>
                    </td>
                    <td>${proofModeBadge}</td>
                    <td>${dciLayout}</td>
                    <td><span class="badge" style="background-color: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; font-size:11px; font-weight:600;">${templateName}</span></td>
                    <td>${usageTagsHtml}</td>
                    <td>${starLayout}</td>
                    <td>${saleBadge}</td>
                    <td>${actionBtn}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function resetSearch() {
            document.getElementById('assetKeyword').value = '';
            document.getElementById('searchSaleStatus').value = '全部';
            document.getElementById('searchAssetType').value = '全部';
            loadMaterialsList();
        }

        // Toggle sale status: up or down
        function toggleSaleStatus(assetId, targetStatus) {
            const assets = dbGet('hscms_asset_submissions', []);
            const aIdx = assets.findIndex(item => item.id === assetId);
            if (aIdx === -1) return;

            if (targetStatus) {
                assets[aIdx].onSale = true;
                
                // 如果素材没有绑定任何模板，自动关联首个价格模板及全部用途
                if (!assets[aIdx].linkedTemplateId || !assets[aIdx].linkedUsage) {
                    const templates = dbGet('hscms_settings_usage_templates', []);
                    if (templates.length > 0) {
                        assets[aIdx].linkedTemplateId = templates[0].id;
                        let allUsages = [];
                        const usageConfig = templates[0].usageConfig || [];
                        usageConfig.forEach(cat => {
                            if (cat.specs && cat.specs.length > 0) {
                                cat.specs.forEach(spec => {
                                    const specName = (typeof spec === 'object' && spec !== null) ? (spec.name || '') : String(spec);
                                    if (specName) allUsages.push(specName);
                                });
                            }
                        });
                        assets[aIdx].linkedUsage = allUsages.join(', ');
                    }
                }
                
                dbSave('hscms_asset_submissions', assets);
                showLockToast('素材已成功上架！', true);
            } else {
                assets[aIdx].onSale = false;
                dbSave('hscms_asset_submissions', assets);
                showLockToast('素材已下架成功！', true);
            }

            loadMaterialsList();
        }

        // --- Usage Modal Logic ---
        function toggleSelectAllUsage(checkbox) {
            const checkboxes = document.querySelectorAll('input[name="usageSpecCheckbox"]');
            checkboxes.forEach(cb => {
                cb.checked = checkbox.checked;
            });
        }

        function updateSelectAllState() {
            const totalCheckbox = document.querySelectorAll('input[name="usageSpecCheckbox"]');
            const checkedCheckbox = document.querySelectorAll('input[name="usageSpecCheckbox"]:checked');
            const selectAllCheckbox = document.getElementById('selectAllUsage');
            if (selectAllCheckbox) {
                selectAllCheckbox.checked = (totalCheckbox.length > 0 && totalCheckbox.length === checkedCheckbox.length);
            }
        }

        function openLinkUsageModal(assetId) {
            const assets = dbGet('hscms_asset_submissions', []);
            const a = assets.find(item => item.id === assetId);
            if (!a) return;

            document.getElementById('usageAssetId').value = assetId;

            // 1. 获取全量用途价格模板
            const templates = dbGet('hscms_settings_usage_templates', []);
            const select = document.getElementById('modalUsageTemplateSelect');
            select.innerHTML = '';

            if (templates.length === 0) {
                select.innerHTML = `<option value="">-- 暂无可用模板，请先配置 --</option>`;
                document.getElementById('usageOptionsWrapper').innerHTML = `<div style="color:#ef4444; font-size:12px; text-align:center;">暂无任何授权用途模板，请先前往配置。</div>`;
                openModal('usageModal');
                return;
            }

            templates.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = t.name;
                select.appendChild(opt);
            });

            // 2. 回显或默认选中关联的模板 ID
            const currentTemplateId = a.linkedTemplateId || templates[0].id;
            select.value = currentTemplateId;

            // 3. 渲染选中模板下的复选框树
            renderTemplateUsages(currentTemplateId, a.linkedUsage);

            openModal('usageModal');
        }

        // 模板下拉切换事件
        function onTemplateChange() {
            const select = document.getElementById('modalUsageTemplateSelect');
            const templateId = parseInt(select.value);
            if (!templateId) return;

            const assetId = document.getElementById('usageAssetId').value;
            const assets = dbGet('hscms_asset_submissions', []);
            const a = assets.find(item => item.id === assetId);
            if (!a) return;

            // 如果切换到了与素材已保存模板不同的模板，默认一键全选所有项以防空；相同则回显已关联的用途
            const matchedTemplate = (a.linkedTemplateId === templateId);
            const usagesToHighlight = matchedTemplate ? a.linkedUsage : '';

            renderTemplateUsages(templateId, usagesToHighlight);
        }

        // 动态根据模板配置生成两级多选复选框
        function renderTemplateUsages(templateId, linkedUsageStr) {
            const templates = dbGet('hscms_settings_usage_templates', []);
            const t = templates.find(item => item.id === templateId);
            const wrapper = document.getElementById('usageOptionsWrapper');
            wrapper.innerHTML = '';

            if (!t || !t.usageConfig || t.usageConfig.length === 0) {
                wrapper.innerHTML = `<div style="color:#94a3b8; font-size:12px; text-align:center; font-style:italic; padding: 20px;">该价格模板下暂无任何授权用途二级配置。</div>`;
                updateSelectAllState();
                return;
            }

            const usageConfig = t.usageConfig;
            const currentUsages = linkedUsageStr ? linkedUsageStr.split(', ') : [];
            const shouldSelectAllDefault = (!linkedUsageStr || linkedUsageStr.trim() === ''); // 没有已选规格时，默认一键全选

            usageConfig.forEach(category => {
                const groupDiv = document.createElement('div');
                groupDiv.style.border = '1px solid #e2e8f0';
                groupDiv.style.borderRadius = '8px';
                groupDiv.style.padding = '12px';
                groupDiv.style.backgroundColor = '#f8fafc';

                const header = document.createElement('div');
                header.style.fontWeight = 'bold';
                header.style.fontSize = '13px';
                header.style.color = '#1e293b';
                header.style.marginBottom = '8px';
                header.textContent = category.name;
                groupDiv.appendChild(header);

                const listDiv = document.createElement('div');
                listDiv.style.display = 'flex';
                listDiv.style.flexDirection = 'column';
                listDiv.style.gap = '8px';
                listDiv.style.paddingLeft = '8px';

                if (category.specs && category.specs.length > 0) {
                    category.specs.forEach(spec => {
                        let specName = '';
                        let specPrice = 100;
                        if (typeof spec === 'object' && spec !== null) {
                            specName = spec.name || '';
                            specPrice = typeof spec.price !== 'undefined' ? spec.price : 100;
                        } else {
                            specName = String(spec);
                        }

                        const label = document.createElement('label');
                        label.style.display = 'flex';
                        label.style.alignItems = 'center';
                        label.style.gap = '8px';
                        label.style.fontSize = '12.5px';
                        label.style.color = '#475569';
                        label.style.cursor = 'pointer';

                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.name = 'usageSpecCheckbox';
                        checkbox.value = specName;
                        checkbox.onchange = updateSelectAllState;
                        
                        if (shouldSelectAllDefault || currentUsages.includes(specName)) {
                            checkbox.checked = true;
                        }

                        const textSpan = document.createElement('span');
                        textSpan.innerHTML = `${specName} <strong style="color:var(--primary-color);">(￥${specPrice})</strong>`;

                        label.appendChild(checkbox);
                        label.appendChild(textSpan);
                        listDiv.appendChild(label);
                    });
                } else {
                    const noSpecs = document.createElement('div');
                    noSpecs.style.color = '#94a3b8';
                    noSpecs.style.fontSize = '12px';
                    noSpecs.style.fontStyle = 'italic';
                    noSpecs.textContent = '暂无细分规格';
                    listDiv.appendChild(noSpecs);
                }

                groupDiv.appendChild(listDiv);
                wrapper.appendChild(groupDiv);
            });

            updateSelectAllState();
        }

        // 保存用途关联配置
        function submitUsageLink(e) {
            e.preventDefault();
            const assetId = document.getElementById('usageAssetId').value;
            const select = document.getElementById('modalUsageTemplateSelect');
            const templateId = parseInt(select.value);

            const checkedBoxes = document.querySelectorAll('input[name="usageSpecCheckbox"]:checked');
            const selectedUsages = Array.from(checkedBoxes).map(cb => cb.value);

            const assets = dbGet('hscms_asset_submissions', []);
            const aIdx = assets.findIndex(a => a.id === assetId);

            if (aIdx !== -1) {
                assets[aIdx].linkedTemplateId = templateId || null;
                assets[aIdx].linkedUsage = selectedUsages.join(', ');
                dbSave('hscms_asset_submissions', assets);

                showLockToast('关联用途与模板配置成功！', true);
                closeModal('usageModal');
                loadMaterialsList();
            }
        }
    </script>
</body>
</html>
