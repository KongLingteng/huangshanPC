<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Table Search Styling */
        .search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
            background: #ffffff;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            align-items: flex-end;
        }
        .search-col {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .search-col label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Toolbar Styling */
        .toolbar-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .toolbar-left {
            display: flex;
            gap: 8px;
        }
        .toolbar-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .tool-btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 1px solid var(--border-color);
            background: #ffffff;
            border-radius: 6px;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
        }
        .tool-btn-icon:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .tool-btn-icon svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Pagination style */
        .pagination-btn {
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #374151;
            transition: all 0.2s ease;
        }
        .pagination-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .pagination-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #ffffff;
        }
        .pagination-btn:disabled {
            background: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
            border-color: var(--border-color);
        }

        /* Switch Custom Toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .3s;
            border-radius: 22px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--primary-color);
        }
        input:checked + .slider:before {
            transform: translateX(18px);
        }

        /* Small action buttons in column */
        .action-icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 4px;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 2px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        .action-icon-btn:hover {
            background: #e2e8f0;
            color: var(--primary-color);
        }
        .action-icon-btn.danger:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fecaca;
        }
        .action-icon-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Form styling */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 12.5px;
            font-weight: 600;
            color: #334155;
        }

        /* Checkbox grid for modal roles */
        .role-check-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 6px;
        }
        .role-check-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
        }
    </style>
</head>

    <!-- MODAL 2: RESET PASSWORD -->
    <div id="resetPwdModal" class="modal-overlay">

                        <input type="text" id="resetPwdUsername" class="form-control" disabled>

                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal('resetPwdModal')">取消</button>
                    <button type="submit" class="btn btn-primary">确认重置</button>
                </div>

        </div>

    <!-- MODAL 3: ASSIGN ROLE -->
    <div id="assignRoleModal" class="modal-overlay">
        <div class="modal-card" style="max-width: 450px;">
            <div class="modal-header">
                <h3>分配用户角色</h3>
                <button class="modal-close-btn" onclick="closeModal('assignRoleModal')">&times;</button>
            </div>
            <form onsubmit="submitAssignRole(event)">
                <input type="hidden" id="assignRoleUserId" value="">
                <div class="modal-body" style="padding: 20px 0;">
                    <div class="form-group">
                        <label>用户昵称</label>
                        <input type="text" id="assignRoleNickname" class="form-control" disabled>
                    </div>
                    <div class="form-group" style="margin-top: 14px;">
                        <label>勾选赋予角色</label>
                        <div class="role-check-grid">
                            <label class="role-check-item"><input type="checkbox" name="assignRoles" value="超级管理员"> 超级管理员</label>
                            <label class="role-check-item"><input type="checkbox" name="assignRoles" value="部门管理员"> 部门管理员</label>
                            <label class="role-check-item"><input type="checkbox" name="assignRoles" value="供稿人角色"> 供稿人角色</label>
                            <label class="role-check-item"><input type="checkbox" name="assignRoles" value="普通角色"> 普通角色</label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal('assignRoleModal')">取消</button>
                    <button type="submit" class="btn btn-primary">确认分配</button>
                </div>
            </form>
        </div>
    </div>

    <!-- TOASTS -->
    <div id="lockToast" class="toast-container">
        <svg id="lockToastIcon" class="toast-icon" viewBox="0 0 24 24"></svg>
        <span id="lockToastText"></span>
    </div>

    <script src="js/common.js"></script>
    <script>
        // Pagination state
        let curPage = 1;
        let pageSize = 10;
        let filteredUsers = [];

        // Global users cache
        let allUsers = [];

        window.addEventListener('DOMContentLoaded', () => {
            initDatabase();
            autoUpgradeUsersData();
            loadUsersData();
        });

        // Toggle search row visualization
        function toggleSearchRow() {
            const row = document.querySelector('.search-row');
            if (row) {
                if (row.style.display === 'none') {
                    row.style.display = 'flex';
                } else {
                    row.style.display = 'none';
                }
            }
        }

        // Data Self-Healing Upgrade on load
        function autoUpgradeUsersData() {
            let list = dbGet('hscms_users', DEFAULT_USERS);
            let updated = false;

            list.forEach(u => {
                if (!u.username) {
                    u.username = u.userId.toLowerCase();
                    updated = true;
                }
                if (!u.deptName) {
                    if (u.identity === '机构供稿') {
                        u.deptName = '供稿合作部';
                    } else if (u.role && u.role.includes('管理')) {
                        u.deptName = '总部';
                    } else {
                        u.deptName = '运营部';
                    }
                    updated = true;
                }
                if (!u.phoneNumber) {
                    const suffix = u.userId.replace('USER_', '');
                    u.phoneNumber = '158' + suffix.padStart(4, '0') + suffix.substring(Math.max(0, suffix.length - 4));
                    updated = true;
                }
                if (!u.status) {
                    u.status = '正常';
                    updated = true;
                }
                if (!u.createTime) {
                    u.createTime = (u.joinTime || '2026-03-24') + ' 20:56:24';
                    updated = true;
                }
                if (!u.password) {
                    u.password = '123456';
                    updated = true;
                }
                if (!u.dataScope) {
                    u.dataScope = '全部数据权限';
                    updated = true;
                }
                // Array format support for assigned roles inside user
                if (!u.assignedRoles) {
                    u.assignedRoles = [u.role || '普通角色'];
                    updated = true;
                }
            });

            if (updated) {
                dbSave('hscms_users', list);
            }
        }

        // Fetch user data from local database
        function loadUsersData() {
            allUsers = dbGet('hscms_users', DEFAULT_USERS);
            filteredUsers = [...allUsers];
            curPage = 1;
            loadUsersTable();
        }

        // Render data rows in UI table
        function loadUsersTable() {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';

            const total = filteredUsers.length;
            const totalPages = Math.ceil(total / pageSize) || 1;

            if (curPage > totalPages) curPage = totalPages;
            
            const start = (curPage - 1) * pageSize;
            const end = Math.min(start + pageSize, total);
            const pageData = filteredUsers.slice(start, end);

            document.getElementById('pageInfo').textContent = `共 ${total} 条，当前第 ${curPage}/${totalPages} 页`;
            document.getElementById('gotoPageInput').max = totalPages;
            renderPaginationButtons(totalPages);

            if (pageData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:#9ca3af; padding:24px;">暂无匹配的系统用户数据！</td></tr>`;
                updateToolbarState();
                return;
            }

            pageData.forEach(u => {
                const tr = document.createElement('tr');
                const isChecked = u.status === '正常' ? 'checked' : '';

                tr.innerHTML = `
                    <td style="text-align:center;">
                        <input type="checkbox" name="userCheckRow" value="${u.userId}" onchange="updateToolbarState()">
                    </td>
                    <td><code>${u.userId}</code></td>
                    <td><strong style="color:#1f2937;">${u.username}</strong></td>
                    <td>${u.nickname}</td>
                    <td>${u.deptName}</td>
                    <td>${u.phoneNumber || '-'}</td>
                    <td>
                        <label class="switch">
                            <input type="checkbox" ${isChecked} onchange="toggleUserStatus('${u.userId}', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td style="font-size:12px; color:#64748b;">${u.createTime}</td>
                    <td style="text-align:center;">
                        <button class="action-icon-btn" onclick="openEditUserModal('${u.userId}')" title="修改用户">
                            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        </button>
                        <button class="action-icon-btn danger" onclick="deleteSingleUser('${u.userId}')" title="删除用户">
                            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        </button>
                        <button class="action-icon-btn" onclick="openResetPassword('${u.userId}')" title="重置密码">
                            <svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
                        </button>
                        <button class="action-icon-btn" onclick="openAssignRole('${u.userId}')" title="分配角色">
                            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('checkAll').checked = false;
            updateToolbarState();
        }

        // Render paginator buttons list
        function renderPaginationButtons(totalPages) {
            const container = document.getElementById('paginationButtons');
            container.innerHTML = '';

            const prev = document.createElement('button');
            prev.className = 'pagination-btn';
            prev.textContent = '‹';
            prev.disabled = curPage === 1;
            prev.onclick = () => {
                curPage--;
                loadUsersTable();
            };
            container.appendChild(prev);

            let startPage = Math.max(1, curPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            if (endPage - startPage < 4) {
                startPage = Math.max(1, endPage - 4);
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = `pagination-btn ${curPage === i ? 'active' : ''}`;
                btn.textContent = i;
                btn.onclick = () => {
                    curPage = i;
                    loadUsersTable();
                };
                container.appendChild(btn);
            }

            const next = document.createElement('button');
            next.className = 'pagination-btn';
            next.textContent = '›';
            next.disabled = curPage === totalPages;
            next.onclick = () => {
                curPage++;
                loadUsersTable();
            };
            container.appendChild(next);
        }

        function changePageSize(size) {
            pageSize = parseInt(size);
            curPage = 1;
            loadUsersTable();
        }

        function gotoPage() {
            const input = document.getElementById('gotoPageInput');
            let val = parseInt(input.value);
            const totalPages = Math.ceil(filteredUsers.length / pageSize) || 1;
            if (isNaN(val) || val < 1) val = 1;
            if (val > totalPages) val = totalPages;
            curPage = val;
            input.value = val;
            loadUsersTable();
        }

        // Search action
        function searchUsers() {
            const keyword = document.getElementById('searchKeyword').value.trim().toLowerCase();
            const status = document.getElementById('searchStatus').value;
            const dateStart = document.getElementById('searchDateStart').value;
            const dateEnd = document.getElementById('searchDateEnd').value;

            filteredUsers = allUsers.filter(u => {
                const matchesKeyword = !keyword || 
                    u.username.toLowerCase().includes(keyword) || 
                    u.nickname.toLowerCase().includes(keyword) || 
                    (u.phoneNumber && u.phoneNumber.includes(keyword));

                const matchesStatus = !status || u.status === status;

                let matchesDate = true;
                if (dateStart || dateEnd) {
                    const uDate = u.createTime ? u.createTime.split(' ')[0] : '';
                    if (dateStart && uDate < dateStart) matchesDate = false;
                    if (dateEnd && uDate > dateEnd) matchesDate = false;
                }

                return matchesKeyword && matchesStatus && matchesDate;
            });

            curPage = 1;
            loadUsersTable();
        }

        function resetSearch() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('searchStatus').value = '';
            document.getElementById('searchDateStart').value = '';
            document.getElementById('searchDateEnd').value = '';
            filteredUsers = [...allUsers];
            curPage = 1;
            loadUsersTable();
        }

        // Toggle user status switch callback
        function toggleUserStatus(userId, checked) {
            const status = checked ? '正常' : '停用';
            const list = dbGet('hscms_users', DEFAULT_USERS);
            const idx = list.findIndex(u => u.userId === userId);
            if (idx !== -1) {
                list[idx].status = status;
                dbSave('hscms_users', list);
                allUsers = list;
                showLockToast(`用户状态已成功更改为: ${status}`, true);
                // Sync current filter list without reloading layout
                const target = filteredUsers.find(u => u.userId === userId);
                if (target) target.status = status;
            }
        }

        // Synchronize Toolbar Action Status based on checklists
        function updateToolbarState() {
            const checks = document.getElementsByName('userCheckRow');
            let selectedCount = 0;
            checks.forEach(c => {
                if (c.checked) selectedCount++;
            });

            document.getElementById('btnBulkEdit').disabled = selectedCount !== 1;
            document.getElementById('btnBulkDelete').disabled = selectedCount === 0;
        }

        function toggleCheckAll(checked) {
            const checks = document.getElementsByName('userCheckRow');
            checks.forEach(c => {
                c.checked = checked;
            });
            updateToolbarState();
        }

        // =======================================
        // CRUD MODALS CONTROLLER
        // =======================================
        function openAddUserModal() {
            document.getElementById('userModalTitle').textContent = '新增系统用户';
            document.getElementById('editUserId').value = '';
            document.getElementById('formUsername').value = '';
            document.getElementById('formUsername').disabled = false;
            document.getElementById('formNickname').value = '';
            document.getElementById('formDeptName').value = '总部';
            document.getElementById('formPhoneNumber').value = '';
            document.getElementById('formStatus').value = '正常';
            document.getElementById('formPost').value = '运营专员';

            const roleChecks = document.getElementsByName('formRoles');
            roleChecks.forEach(c => c.checked = false);

            openModal('userModal');
        }

        function openEditUserModal(userId) {
            const u = allUsers.find(item => item.userId === userId);
            if (!u) return;

            document.getElementById('userModalTitle').textContent = '修改系统用户';
            document.getElementById('editUserId').value = u.userId;
            document.getElementById('formUsername').value = u.username || '';
            document.getElementById('formUsername').disabled = true;
            document.getElementById('formNickname').value = u.nickname || '';
            document.getElementById('formDeptName').value = u.deptName || '总部';
            document.getElementById('formPhoneNumber').value = u.phoneNumber || '';
            document.getElementById('formStatus').value = u.status || '正常';
            document.getElementById('formPost').value = u.post || '运营专员';

            const roleChecks = document.getElementsByName('formRoles');
            const userRoles = u.assignedRoles || [u.role || '普通角色'];
            roleChecks.forEach(c => {
                c.checked = userRoles.includes(c.value);
            });

            openModal('userModal');
        }

        function openEditSelectedUser() {
            const checks = document.getElementsByName('userCheckRow');
            let targetUserId = '';
            checks.forEach(c => {
                if (c.checked) targetUserId = c.value;
            });
            if (targetUserId) {
                openEditUserModal(targetUserId);
            }
        }

        function submitUserForm(e) {
            e.preventDefault();
            const editId = document.getElementById('editUserId').value;
            const username = document.getElementById('formUsername').value.trim();
            const nickname = document.getElementById('formNickname').value.trim();
            const deptName = document.getElementById('formDeptName').value;
            const phoneNumber = document.getElementById('formPhoneNumber').value.trim();
            const status = document.getElementById('formStatus').value;
            const post = document.getElementById('formPost').value;

            // Form validation
            if (!username || !nickname) {
                showLockToast('必填项不能为空！');
                return;
            }
            if (phoneNumber && !/^\d{11}$/.test(phoneNumber)) {
                showLockToast('请输入有效的11位联系电话！');
                return;
            }

            const roleChecks = document.getElementsByName('formRoles');
            const selectedRoles = [];
            roleChecks.forEach(c => {
                if (c.checked) selectedRoles.push(c.value);
            });

            const list = dbGet('hscms_users', DEFAULT_USERS);

            if (editId) {
                // Update User
                const idx = list.findIndex(u => u.userId === editId);
                if (idx !== -1) {
                    list[idx].nickname = nickname;
                    list[idx].deptName = deptName;
                    list[idx].phoneNumber = phoneNumber;
                    list[idx].status = status;
                    list[idx].post = post;
                    list[idx].assignedRoles = selectedRoles;
                    if (selectedRoles.length > 0) {
                        list[idx].role = selectedRoles.join(', ');
                    }
                    dbSave('hscms_users', list);
                    showLockToast('用户信息修改成功！', true);
                }
            } else {
                // Insert User
                // Check username duplicate
                if (list.some(u => u.username.toLowerCase() === username.toLowerCase())) {
                    showLockToast('该用户登录名称已存在，请换一个！');
                    return;
                }

                const formatTime = (d) => {
                    const pad = (n) => String(n).padStart(2, '0');
                    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
                };

                const newUserId = 'USER_' + Math.floor(1000 + Math.random() * 9000);
                const newUser = {
                    userId: newUserId,
                    username: username,
                    nickname: nickname,
                    deptName: deptName,
                    phoneNumber: phoneNumber,
                    status: status,
                    post: post,
                    role: selectedRoles.length > 0 ? selectedRoles.join(', ') : '普通角色',
                    assignedRoles: selectedRoles.length > 0 ? selectedRoles : ['普通角色'],
                    createTime: formatTime(new Date()),
                    joinTime: formatTime(new Date()).split(' ')[0],
                    password: '123456',
                    dataScope: '全部数据权限',
                    avatar: '',
                    bio: '系统新增管理人员。',
                    identity: '普通用户',
                    aiTextLimit: 1000, aiTextUsed: 0,
                    aiImageLimit: 100, aiImageUsed: 0,
                    aiVideoLimit: 20, aiVideoUsed: 0
                };

                list.unshift(newUser);
                dbSave('hscms_users', list);
                showLockToast('系统用户新增成功！默认密码为 123456', true);
            }

            closeModal('userModal');
            loadUsersData();
        }

        // Delete handlers
        function deleteSingleUser(userId) {
            if (confirm(`确认要删除用户 ID 为 [${userId}] 的系统用户吗？`)) {
                performDeleteUsers([userId]);
            }
        }

        function deleteSelectedUsers() {
            const checks = document.getElementsByName('userCheckRow');
            const toDelete = [];
            checks.forEach(c => {
                if (c.checked) toDelete.push(c.value);
            });

            if (toDelete.length === 0) return;
            if (confirm(`确认要批量删除选中的 ${toDelete.length} 个系统用户吗？`)) {
                performDeleteUsers(toDelete);
            }
        }

        function performDeleteUsers(userIdList) {
            let list = dbGet('hscms_users', DEFAULT_USERS);
            list = list.filter(u => !userIdList.includes(u.userId));
            dbSave('hscms_users', list);
            showLockToast('选定用户已成功移除！', true);
            loadUsersData();
        }

        // Password Reset modal logic
        function openResetPassword(userId) {
            const u = allUsers.find(item => item.userId === userId);
            if (!u) return;

            document.getElementById('resetPwdUserId').value = u.userId;
            document.getElementById('resetPwdUsername').value = u.username;
            document.getElementById('resetPwdNewVal').value = '';

            openModal('resetPwdModal');
        }

        function submitResetPassword(e) {
            e.preventDefault();
            const targetId = document.getElementById('resetPwdUserId').value;
            const newPwd = document.getElementById('resetPwdNewVal').value;

            if (newPwd.length < 6) {
                showLockToast('密码长度必须在6位及以上！');
                return;
            }

            const list = dbGet('hscms_users', DEFAULT_USERS);
            const idx = list.findIndex(u => u.userId === targetId);
            if (idx !== -1) {
                list[idx].password = newPwd;
                dbSave('hscms_users', list);
                showLockToast('密码重置成功！', true);
            }
            closeModal('resetPwdModal');
        }

        // Assign Role modal logic
        function openAssignRole(userId) {
            const u = allUsers.find(item => item.userId === userId);
            if (!u) return;

            document.getElementById('assignRoleUserId').value = u.userId;
            document.getElementById('assignRoleNickname').value = u.nickname;

            const checks = document.getElementsByName('assignRoles');
            const userRoles = u.assignedRoles || [u.role || '普通角色'];
            checks.forEach(c => {
                c.checked = userRoles.includes(c.value);
            });

            openModal('assignRoleModal');
        }

        function submitAssignRole(e) {
            e.preventDefault();
            const targetId = document.getElementById('assignRoleUserId').value;
            const checks = document.getElementsByName('assignRoles');
            const selected = [];
            checks.forEach(c => {
                if (c.checked) selected.push(c.value);
            });

            const list = dbGet('hscms_users', DEFAULT_USERS);
            const idx = list.findIndex(u => u.userId === targetId);
            if (idx !== -1) {
                list[idx].assignedRoles = selected;
                list[idx].role = selected.length > 0 ? selected.join(', ') : '普通角色';
                dbSave('hscms_users', list);
                showLockToast('角色分配成功！', true);
            }
            closeModal('assignRoleModal');
            loadUsersData();
        }
    </script>
</body>
</html>
