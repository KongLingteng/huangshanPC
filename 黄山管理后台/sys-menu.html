<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Table Search Styling */
        .search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
            background: #ffffff;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            align-items: flex-end;
        }
        .search-col {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .search-col label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Toolbar Styling */
        .toolbar-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .toolbar-left {
            display: flex;
            gap: 8px;
        }
        .toolbar-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .tool-btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 1px solid var(--border-color);
            background: #ffffff;
            border-radius: 6px;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
        }
        .tool-btn-icon:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .tool-btn-icon svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Pagination style */
        .pagination-btn {
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #374151;
            transition: all 0.2s ease;
        }
        .pagination-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .pagination-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #ffffff;
        }
        .pagination-btn:disabled {
            background: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
            border-color: var(--border-color);
        }

        /* Switch Custom Toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .3s;
            border-radius: 22px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--primary-color);
        }
        input:checked + .slider:before {
            transform: translateX(18px);
        }

        /* Small action buttons in column */
        .action-icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 4px;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 2px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        .action-icon-btn:hover {
            background: #e2e8f0;
            color: var(--primary-color);
        }
        .action-icon-btn.danger:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fecaca;
        }
        .action-icon-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Form styling */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 12.5px;
            font-weight: 600;
            color: #334155;
        }

        /* Tree display tweaks */
        .tree-node-name {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .tree-toggle-arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            cursor: pointer;
            user-select: none;
            color: #64748b;
            font-size: 11px;
            transition: transform 0.2s;
        }
        .tree-toggle-arrow.collapsed {
            transform: rotate(-90deg);
        }
        .menu-indent {
            display: inline-block;
            width: 24px;
        }
    </style>
</head>

    <script>
        // Global menu states
        let allMenus = [];
        let filteredMenus = [];
        let globalExpanded = true;
        let collapsedParentIds = new Set(); // Track collapsed parent menu IDs

        // Existing menus as mock dataset
        const DEFAULT_MENUS = [
            { menuId: 1, parentId: 0, menuName: "首页", path: "/index", orderNum: 10, component: "index.html", visible: "显示", status: "正常", createTime: "2026-03-24 20:56:24" },

            { menuId: 21, parentId: 2, menuName: "帖子管理", path: "/ugc/post", orderNum: 10, component: "ugc.html", visible: "显示", status: "正常", createTime: "2026-03-24 20:56:24" },
            { menuId: 22, parentId: 2, menuName: "评论管理", path: "/ugc/comment", orderNum: 20, component: "ugc.html#comments", visible: "显示", status: "正常", createTime: "2026-03-24 20:56:24" },
            { menuId: 23, parentId: 2, menuName: "用户黑名单", path: "/ugc/blacklist", orderNum: 30, component: "ugc.html#blacklist", visible: "显示", status: "正常", createTime: "2026-03-24 20:56:24" },
            { menuId: 24, parentId: 2, menuName: "推荐话题", path: "/ugc/topic", orderNum: 40, component: "index.html", visible: "显示", status: "正常", createTime: "2026-03-24 20:56:24" },
            { menuId: 3, parentId: 0, menuName: "素材管理", path: "/asset-audit", orderNum: 30, component: "asset-audit.html", visible: "显示", status: "正常", createTime: "2026-03-24 20:56:24" },
            { menuId: 31, parentId: 3, menuName: "待审核列表", path: "/asset-audit/list", orderNum: 10, component: "asset-audit.html", visible: "显示", status: "正常", createTime: "2026-03-24 20:56:24" },
            { menuId: 32, parentId: 3, menuName: "素材库", path: "/material-library", orderNum: 20, component: "material-library.html", visible: "显示", status: "正常", createTime: "2026-03-24 20:56:24" },
            { menuId: 4, parentId: 0, menuName: "系统设置", path: "/settings", orderNum: 97, component: "settings.html", visible: "显示", status: "正常", createTime: "2026-03-24 20:56:24" },
            { menuId: 41, parentId: 4, menuName: "系统用户管理", path: "/sys-user", orderNum: 10, component: "sys-user.html", visible: "显示", status: "正常", createTime: "2026-03-24 20:56:24" },
            { menuId: 42, parentId: 4, menuName: "角色管理", path: "/sys-role", orderNum: 20, component: "sys-role.html", visible: "显示", status: "正常", createTime: "2026-03-24 20:56:24" },
            { menuId: 43, parentId: 4, menuName: "菜单管理", path: "/sys-menu", orderNum: 30, component: "sys-menu.html", visible: "显示", status: "正常", createTime: "2026-03-24 20:56:24" }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            initDatabase();
            loadMenusData();
        });

        // Hide/Show Search section
        function toggleSearchRow() {
            const row = document.querySelector('.search-row');
            if (row) {
                row.style.display = row.style.display === 'none' ? 'flex' : 'none';
            }
        }

        // Fetch menus and sort hierarchically
        function loadMenusData() {
            allMenus = dbGet('hscms_menus', DEFAULT_MENUS);
            let changed = false;
            allMenus.forEach(m => {
                if (m.path === undefined) {
                    const dm = DEFAULT_MENUS.find(x => x.menuId === m.menuId);
                    m.path = dm ? dm.path : "";
                    changed = true;
                }
                if (m.perms !== undefined) {
                    delete m.perms;
                    changed = true;
                }
                if (m.i18nKey !== undefined) {
                    delete m.i18nKey;
                    changed = true;
                }
            });
            if (changed) {
                dbSave('hscms_menus', allMenus);
            }
            filteredMenus = [...allMenus];
            renderMenuTreeTable();
        }

        // Sort items: Parents first, then children, matching orderNum
        function getHierarchicalSortedList(list) {
            const parents = list.filter(m => parseInt(m.parentId) === 0).sort((a,b) => a.orderNum - b.orderNum);
            const result = [];

            parents.forEach(p => {
                result.push(p);
                const children = list.filter(m => parseInt(m.parentId) === p.menuId).sort((a,b) => a.orderNum - b.orderNum);
                children.forEach(c => {
                    result.push(c);
                });
            });

            // Handle orphaned nodes just in case
            list.forEach(item => {
                if (parseInt(item.parentId) !== 0 && !result.some(r => r.menuId === item.menuId)) {
                    result.push(item);
                }
            });

            return result;
        }

        function renderMenuTreeTable() {
            const tbody = document.getElementById('menuTableBody');
            tbody.innerHTML = '';

            const sorted = getHierarchicalSortedList(filteredMenus);

            if (sorted.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#9ca3af; padding:24px;">暂无匹配的菜单管理数据！</td></tr>`;
                return;
            }

            sorted.forEach(m => {
                const tr = document.createElement('tr');
                const isParent = parseInt(m.parentId) === 0;
                
                // Determine whether child is hidden based on parent collapse
                if (!isParent && collapsedParentIds.has(parseInt(m.parentId))) {
                    tr.style.display = 'none';
                }

                tr.setAttribute('data-id', m.menuId);
                tr.setAttribute('data-parent', m.parentId);

                // Checkboxes configuration for visible and status
                const isVisibleChecked = m.visible === '显示' ? 'checked' : '';
                const isStatusChecked = m.status === '正常' ? 'checked' : '';

                // Building Menu Name HTML with toggle arrows for Parents, Indentation for Children
                let nameHtml = '';
                if (isParent) {
                    // Check if it has any children
                    const hasChildren = allMenus.some(child => parseInt(child.parentId) === m.menuId);
                    if (hasChildren) {
                        const arrowClass = collapsedParentIds.has(m.menuId) ? 'tree-toggle-arrow collapsed' : 'tree-toggle-arrow';
                        nameHtml = `
                            <span class="${arrowClass}" onclick="toggleNodeCollapse(${m.menuId})">▼</span>
                            <strong style="color:#1f2937;">${m.menuName}</strong>
                        `;
                    } else {
                        nameHtml = `
                            <span style="display:inline-block; width:18px;"></span>
                            <strong style="color:#1f2937;">${m.menuName}</strong>
                        `;
                    }
                } else {
                    nameHtml = `
                        <span class="menu-indent"></span>
                        <span style="color:#4b5563;">${m.menuName}</span>
                    `;
                }

                tr.innerHTML = `
                    <td>
                        <span class="tree-node-name">${nameHtml}</span>
                    </td>
                    <td><code>${m.path || '-'}</code></td>
                    <td>${m.orderNum}</td>
                    <td>${m.component || '-'}</td>
                    <td>
                        <label class="switch">
                            <input type="checkbox" ${isVisibleChecked} onchange="toggleMenuVisible('${m.menuId}', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td>
                        <label class="switch">
                            <input type="checkbox" ${isStatusChecked} onchange="toggleMenuStatus('${m.menuId}', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td style="font-size:12px; color:#64748b;">${m.createTime}</td>
                    <td style="text-align:center;">
                        <button class="action-icon-btn" onclick="openEditMenuModal('${m.menuId}')" title="修改菜单">
                            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        </button>
                        ${isParent ? `
                        <button class="action-icon-btn" onclick="openAddSubMenuModal('${m.menuId}')" style="color:#22c55e;" title="新增下级菜单">
                            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        </button>
                        ` : `
                        <button class="action-icon-btn" style="opacity: 0.3; cursor: not-allowed;" disabled>
                            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        </button>
                        `}
                        <button class="action-icon-btn danger" onclick="deleteMenu('${m.menuId}')" title="删除菜单">
                            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Toggle visibility of children under parent
        function toggleNodeCollapse(parentId) {
            const hasCollapse = collapsedParentIds.has(parentId);
            if (hasCollapse) {
                collapsedParentIds.delete(parentId);
            } else {
                collapsedParentIds.add(parentId);
            }
            renderMenuTreeTable();
        }

        // One-key collapse/expand all
        function toggleAllExpandState() {
            globalExpanded = !globalExpanded;
            const parents = allMenus.filter(m => parseInt(m.parentId) === 0);
            
            if (globalExpanded) {
                collapsedParentIds.clear();
            } else {
                parents.forEach(p => collapsedParentIds.add(p.menuId));
            }
            renderMenuTreeTable();
        }

        // Toggle Switch handlers
        function toggleMenuVisible(menuId, checked) {
            const val = checked ? '显示' : '隐藏';
            const list = dbGet('hscms_menus', DEFAULT_MENUS);
            const idx = list.findIndex(m => String(m.menuId) === String(menuId));
            if (idx !== -1) {
                list[idx].visible = val;
                dbSave('hscms_menus', list);
                allMenus = list;
                showLockToast(`显示设置已更改为: ${val}`, true);

                const target = filteredMenus.find(m => String(m.menuId) === String(menuId));
                if (target) target.visible = val;
            }
        }

        function toggleMenuStatus(menuId, checked) {
            const val = checked ? '正常' : '停用';
            const list = dbGet('hscms_menus', DEFAULT_MENUS);
            const idx = list.findIndex(m => String(m.menuId) === String(menuId));
            if (idx !== -1) {
                list[idx].status = val;
                dbSave('hscms_menus', list);
                allMenus = list;
                showLockToast(`菜单状态已更改为: ${val}`, true);

                const target = filteredMenus.find(m => String(m.menuId) === String(menuId));
                if (target) target.status = val;
            }
        }

        // Filters
        function searchMenus() {
            const keyword = document.getElementById('searchKeyword').value.trim().toLowerCase();
            const status = document.getElementById('searchStatus').value;

            filteredMenus = allMenus.filter(m => {
                const matchesKeyword = !keyword || m.menuName.toLowerCase().includes(keyword);
                const matchesStatus = !status || m.status === status;
                return matchesKeyword && matchesStatus;
            });
            renderMenuTreeTable();
        }

        function resetSearch() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('searchStatus').value = '';
            filteredMenus = [...allMenus];
            renderMenuTreeTable();
        }

        // Populate parent dropdown list inside form
        function populateParentDropdown(selectedId = 0) {
            const select = document.getElementById('formParentId');
            select.innerHTML = '<option value="0">主目录</option>';
            
            // Allow only root level items to be parents to match system guidelines
            const rootMenus = allMenus.filter(m => parseInt(m.parentId) === 0);
            rootMenus.forEach(rm => {
                const opt = document.createElement('option');
                opt.value = rm.menuId;
                opt.textContent = rm.menuName;
                select.appendChild(opt);
            });

            select.value = selectedId;
        }

        // ============================================
        // Modal Handlers
        // ============================================
        function openAddMenuModal() {
            document.getElementById('menuModalTitle').textContent = '新增菜单';
            document.getElementById('editMenuId').value = '';
            
            populateParentDropdown(0);

            document.getElementById('formMenuName').value = '';
            document.getElementById('formPath').value = '';
            document.getElementById('formOrderNum').value = '';
            document.getElementById('formComponent').value = '';
            document.getElementById('formVisible').value = '显示';
            document.getElementById('formStatus').value = '正常';

            openModal('menuModal');
        }

        function openAddSubMenuModal(parentId) {
            document.getElementById('menuModalTitle').textContent = '新增下级菜单';
            document.getElementById('editMenuId').value = '';

            populateParentDropdown(parentId);
            // Lock parent drop-down select to keep workflow natural
            document.getElementById('formParentId').value = parentId;

            document.getElementById('formMenuName').value = '';
            document.getElementById('formPath').value = '';
            document.getElementById('formOrderNum').value = '';
            document.getElementById('formComponent').value = '';
            document.getElementById('formVisible').value = '显示';
            document.getElementById('formStatus').value = '正常';

            openModal('menuModal');
        }

        function openEditMenuModal(menuId) {
            const m = allMenus.find(item => String(item.menuId) === String(menuId));
            if (!m) return;

            document.getElementById('menuModalTitle').textContent = '修改菜单';
            document.getElementById('editMenuId').value = m.menuId;

            populateParentDropdown(m.parentId);
            
            document.getElementById('formMenuName').value = m.menuName;
            document.getElementById('formPath').value = m.path || '';
            document.getElementById('formOrderNum').value = m.orderNum;
            document.getElementById('formComponent').value = m.component || '';
            document.getElementById('formVisible').value = m.visible || '显示';
            document.getElementById('formStatus').value = m.status || '正常';

            openModal('menuModal');
        }

        function submitMenuForm(e) {
            e.preventDefault();
            const editId = document.getElementById('editMenuId').value;
            const parentId = parseInt(document.getElementById('formParentId').value);
            const menuName = document.getElementById('formMenuName').value.trim();
            const path = document.getElementById('formPath').value.trim();
            const orderNum = parseInt(document.getElementById('formOrderNum').value);
            const component = document.getElementById('formComponent').value.trim();
            const visible = document.getElementById('formVisible').value;
            const status = document.getElementById('formStatus').value;

            if (!menuName || !path || isNaN(orderNum)) {
                showLockToast('必填项不能为空！');
                return;
            }

            const list = dbGet('hscms_menus', DEFAULT_MENUS);

            if (editId) {
                // Edit Menu Item
                const idx = list.findIndex(item => String(item.menuId) === String(editId));
                if (idx !== -1) {
                    list[idx].parentId = parentId;
                    list[idx].menuName = menuName;
                    list[idx].path = path;
                    list[idx].orderNum = orderNum;
                    list[idx].component = component;
                    list[idx].visible = visible;
                    list[idx].status = status;
                    dbSave('hscms_menus', list);
                    showLockToast('菜单修改成功！', true);
                }
            } else {
                // Add Menu Item
                const formatTime = (d) => {
                    const pad = (n) => String(n).padStart(2, '0');
                    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
                };

                // Create a unique menuId
                const nextId = list.length > 0 ? (Math.max(...list.map(x => parseInt(x.menuId))) + 1) : 1;

                const newMenu = {
                    menuId: nextId,
                    parentId: parentId,
                    menuName: menuName,
                    path: path,
                    orderNum: orderNum,
                    component: component,
                    visible: visible,
                    status: status,
                    createTime: formatTime(new Date())
                };

                list.push(newMenu);
                dbSave('hscms_menus', list);
                showLockToast('菜单新增成功！', true);
            }

            closeModal('menuModal');
            loadMenusData();
        }

        // Delete menu item with check protection
        function deleteMenu(menuId) {
            // Check if this menu has any submenus
            const hasChildren = allMenus.some(item => String(item.parentId) === String(menuId));
            if (hasChildren) {
                showLockToast('该菜单项下包含子级菜单，禁止直接删除！');
                return;
            }

            if (confirm(`确认要删除菜单 ID 为 [${menuId}] 的系统菜单吗？`)) {
                let list = dbGet('hscms_menus', DEFAULT_MENUS);
                list = list.filter(item => String(item.menuId) !== String(menuId));
                dbSave('hscms_menus', list);
                showLockToast('菜单已成功删除！', true);
                loadMenusData();
            }
        }
    </script>
</body>
</html>
