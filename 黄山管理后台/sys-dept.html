    <style>
        /* Table Search Styling */
        .search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
            background: #ffffff;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            align-items: flex-end;
        }
        .search-col {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .search-col label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Toolbar Styling */
        .toolbar-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .toolbar-left {
            display: flex;
            gap: 8px;
        }
        .toolbar-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .tool-btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 1px solid var(--border-color);
            background: #ffffff;
            border-radius: 6px;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
        }
        .tool-btn-icon:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .tool-btn-icon svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Tree Indent and Arrows */
        .tree-indent {
            display: inline-block;
            height: 1px;
        }
        .tree-toggle-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            color: #64748b;
            cursor: pointer;
            font-size: 10px;
            user-select: none;
            transition: transform 0.2s;
        }

        /* Switch Custom Toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .3s;
            border-radius: 22px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--primary-color);
        }
        input:checked + .slider:before {
            transform: translateX(18px);
        }

        /* Small action buttons in column */
        .action-icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 4px;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 2px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        .action-icon-btn:hover {
            background: #e2e8f0;
            color: var(--primary-color);
        }
        .action-icon-btn.danger:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fecaca;
        }
        .action-icon-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Form styling */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 12.5px;
            font-weight: 600;
            color: #334155;
        }
    </style>

    <script>
        // Global variables
        let allDepts = [];
        let filteredDepts = [];
        let globalExpanded = true;
        let collapsedDeptIds = new Set(); // Track collapsed parent department IDs

        // Predefined database Cold-start
        const DEFAULT_DEPTS = [
            { deptId: 'dept_1', parentId: '0', deptName: '总部', orderNum: 0, status: '正常', createTime: '2026-03-24 20:56:24' },
            { deptId: 'dept_2', parentId: 'dept_1', deptName: '研发部', orderNum: 1, status: '正常', createTime: '2026-03-24 20:56:24' },
            { deptId: 'dept_3', parentId: 'dept_1', deptName: '运营部', orderNum: 2, status: '正常', createTime: '2026-03-24 20:56:24' },
            { deptId: 'dept_4', parentId: 'dept_1', deptName: '财务部', orderNum: 3, status: '正常', createTime: '2026-03-24 20:56:24' },
            { deptId: 'dept_5', parentId: 'dept_1', deptName: '供稿合作部', orderNum: 4, status: '正常', createTime: '2026-03-24 20:56:24' }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            initDatabase();
            loadDeptsData();
            
            // Sync check notification
            if (typeof checkTakeDownNotifications === 'function') {
                checkTakeDownNotifications();
            }
        });

        // Toggle search visibility
        function toggleSearchRow() {
            const row = document.querySelector('.search-row');
            if (row) {
                row.style.display = row.style.display === 'none' ? 'flex' : 'none';
            }
        }

        // Fetch depts list from LocalStorage
        function loadDeptsData() {
            allDepts = dbGet('hscms_depts', DEFAULT_DEPTS);
            filteredDepts = [...allDepts];
            renderDeptTable();
        }

        // Recursive tree sorter
        function getHierarchicalSortedList(list) {
            let result = [];
            const roots = list.filter(d => d.parentId === '0' || !d.parentId).sort((a, b) => a.orderNum - b.orderNum);
            
            function recurse(parentId, depth) {
                const children = list.filter(d => d.parentId === parentId).sort((a, b) => a.orderNum - b.orderNum);
                children.forEach(c => {
                    c.level = depth;
                    result.push(c);
                    recurse(c.deptId, depth + 1);
                });
            }

            roots.forEach(r => {
                r.level = 0;
                result.push(r);
                recurse(r.deptId, 1);
            });

            // Handle orphans just in case
            list.forEach(item => {
                if (!result.some(x => x.deptId === item.deptId)) {
                    item.level = 0;
                    result.push(item);
                }
            });

            return result;
        }

        // Render function
        function renderDeptTable() {
            const tbody = document.getElementById('deptTableBody');
            tbody.innerHTML = '';

            const sorted = getHierarchicalSortedList(filteredDepts);

            if (sorted.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#9ca3af; padding:24px;">暂无匹配的部门管理数据！</td></tr>`;
                return;
            }

            sorted.forEach(d => {
                const tr = document.createElement('tr');
                
                // Determine visibility based on parent collapsed state
                if (isNodeHidden(d, filteredDepts)) {
                    tr.style.display = 'none';
                }

                const isChecked = d.status === '正常' ? 'checked' : '';

                // Render Name with Indent + Toggle arrow if has children
                let nameHtml = '';
                const indentSize = (d.level || 0) * 20;
                const indent = `<span class="tree-indent" style="width:${indentSize}px;"></span>`;
                const hasChildren = allDepts.some(child => child.parentId === d.deptId);

                if (hasChildren) {
                    const arrowClass = collapsedDeptIds.has(d.deptId) ? 'tree-toggle-icon collapsed' : 'tree-toggle-icon';
                    const arrowSymbol = collapsedDeptIds.has(d.deptId) ? '▶' : '▼';
                    nameHtml = `
                        ${indent}
                        <span class="${arrowClass}" style="cursor:pointer; margin-right:4px;" onclick="toggleDeptCollapse('${d.deptId}')">${arrowSymbol}</span>
                        <strong style="color:#1f2937;">${d.deptName}</strong>
                    `;
                } else {
                    nameHtml = `
                        ${indent}
                        <span class="tree-toggle-icon" style="visibility:hidden; margin-right:4px;">▶</span>
                        <span style="color:#4b5563;">${d.deptName}</span>
                    `;
                }

                tr.innerHTML = `
                    <td>${nameHtml}</td>
                    <td style="text-align:center;">${d.orderNum}</td>
                    <td style="text-align:center;">
                        <label class="switch">
                            <input type="checkbox" ${isChecked} onchange="toggleDeptStatus('${d.deptId}', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td style="font-size:12px; color:#64748b;">${d.createTime}</td>
                    <td style="text-align:center;">
                        <button class="action-icon-btn" onclick="openEditDeptModal('${d.deptId}')" title="修改部门">
                            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        </button>
                        <button class="action-icon-btn" onclick="openAddDeptModal('${d.deptId}')" title="新增下级部门" style="color:var(--primary-color);">
                            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        </button>
                        <button class="action-icon-btn danger" onclick="deleteDept('${d.deptId}')" title="删除部门">
                            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        </button>
                    </td>
                `;

                tbody.appendChild(tr);
            });
        }

        // Helper to check if node is hidden due to ancestors being collapsed
        function isNodeHidden(node, list) {
            let parentId = node.parentId;
            while (parentId && parentId !== '0') {
                if (collapsedDeptIds.has(parentId)) {
                    return true;
                }
                const parent = list.find(d => d.deptId === parentId);
                if (!parent) break;
                parentId = parent.parentId;
            }
            return false;
        }

        // Toggle individual collapse
        function toggleDeptCollapse(deptId) {
            if (collapsedDeptIds.has(deptId)) {
                collapsedDeptIds.delete(deptId);
            } else {
                collapsedDeptIds.add(deptId);
            }
            renderDeptTable();
        }

        // Expand / Collapse all toggler
        function toggleExpandAllDepts() {
            const btn = document.getElementById('btnToggleExpand');
            if (globalExpanded) {
                // Collapse all: Find all items with children and add to collapsed set
                allDepts.forEach(d => {
                    const hasChildren = allDepts.some(c => c.parentId === d.deptId);
                    if (hasChildren) {
                        collapsedDeptIds.add(d.deptId);
                    }
                });
                globalExpanded = false;
                btn.textContent = '展开';
                btn.style.background = 'var(--primary-color)';
                btn.style.color = '#ffffff';
                btn.style.borderColor = 'var(--primary-color)';
            } else {
                collapsedDeptIds.clear();
                globalExpanded = true;
                btn.textContent = '收起';
                btn.style.background = '#f1f5f9';
                btn.style.color = '#334155';
                btn.style.borderColor = '#cbd5e1';
            }
            renderDeptTable();
        }

        // Switch toggle status
        function toggleDeptStatus(deptId, isChecked) {
            const targetStatus = isChecked ? '正常' : '停用';
            const index = allDepts.findIndex(d => d.deptId === deptId);
            if (index !== -1) {
                allDepts[index].status = targetStatus;
                dbSave('hscms_depts', allDepts);
                showLockToast(`部门 “${allDepts[index].deptName}” 状态已切换为 ${targetStatus}`, true);
            }
        }

        // Search Filter
        function searchDepts() {
            const keyword = document.getElementById('searchKeyword').value.trim().toLowerCase();
            const status = document.getElementById('searchStatus').value;

            filteredDepts = allDepts.filter(d => {
                const matchKeyword = !keyword || d.deptName.toLowerCase().includes(keyword);
                const matchStatus = !status || d.status === status;
                return matchKeyword && matchStatus;
            });

            renderDeptTable();
        }

        // Reset Filter
        function resetSearch() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('searchStatus').value = '';
            
            // Clear filters and restore state
            filteredDepts = [...allDepts];
            renderDeptTable();
        }

        // Recursive tree descendant finder to prevent cycle dependency
        function getDescendantIds(deptId) {
            let descendants = [deptId];
            const children = allDepts.filter(d => d.parentId === deptId);
            children.forEach(c => {
                descendants = descendants.concat(getDescendantIds(c.deptId));
            });
            return descendants;
        }

        // Helper to populate upper parent options
        function populateParentOptions(currentDeptId = null) {
            const select = document.getElementById('formParentId');
            select.innerHTML = '<option value="0">顶级部门</option>';

            const excludedIds = currentDeptId ? getDescendantIds(currentDeptId) : [];

            // Sorted hierarchical list for beautiful indent selection
            const sorted = getHierarchicalSortedList(allDepts);
            sorted.forEach(d => {
                if (!excludedIds.includes(d.deptId)) {
                    const indentStr = '&nbsp;&nbsp;'.repeat(d.level || 0);
                    select.innerHTML += `<option value="${d.deptId}">${indentStr}${d.deptName}</option>`;
                }
            });
        }

        // Open Add Modal
        function openAddDeptModal(defaultParentId = '0') {
            document.getElementById('deptModalTitle').textContent = '新增部门';
            document.getElementById('editDeptId').value = '';
            
            // Populate select list
            populateParentOptions();

            // Set inputs
            document.getElementById('formParentId').value = defaultParentId;
            document.getElementById('formDeptName').value = '';
            document.getElementById('formOrderNum').value = '0';
            document.getElementById('formStatus').value = '正常';

            openModal('deptModal');
        }

        // Open Edit Modal
        function openEditDeptModal(deptId) {
            const d = allDepts.find(x => x.deptId === deptId);
            if (!d) return;

            document.getElementById('deptModalTitle').textContent = '修改部门';
            document.getElementById('editDeptId').value = d.deptId;

            // Populate upper options and exclude self + descendants
            populateParentOptions(d.deptId);

            document.getElementById('formParentId').value = d.parentId;
            document.getElementById('formDeptName').value = d.deptName;
            document.getElementById('formOrderNum').value = d.orderNum;
            document.getElementById('formStatus').value = d.status;

            openModal('deptModal');
        }

        // Form Submit
        function submitDeptForm(e) {
            e.preventDefault();
            const editId = document.getElementById('editDeptId').value;
            const parentId = document.getElementById('formParentId').value;
            const deptName = document.getElementById('formDeptName').value.trim();
            const orderNum = parseInt(document.getElementById('formOrderNum').value) || 0;
            const status = document.getElementById('formStatus').value;

            if (!deptName) {
                showLockToast('部门名称不能为空！');
                return;
            }

            const now = new Date();
            const curTimeStr = now.getFullYear() + '-' + 
                               String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                               String(now.getDate()).padStart(2, '0') + ' ' + 
                               String(now.getHours()).padStart(2, '0') + ':' + 
                               String(now.getMinutes()).padStart(2, '0') + ':' + 
                               String(now.getSeconds()).padStart(2, '0');

            if (editId) {
                // Update
                const index = allDepts.findIndex(x => x.deptId === editId);
                if (index !== -1) {
                    allDepts[index].parentId = parentId;
                    allDepts[index].deptName = deptName;
                    allDepts[index].orderNum = orderNum;
                    allDepts[index].status = status;

                    dbSave('hscms_depts', allDepts);
                    showLockToast('部门修改保存成功！', true);
                }
            } else {
                // Insert
                const newId = 'dept_' + Math.random().toString(36).substr(2, 9);
                const newDept = {
                    deptId: newId,
                    parentId: parentId,
                    deptName: deptName,
                    orderNum: orderNum,
                    status: status,
                    createTime: curTimeStr
                };
                allDepts.push(newDept);
                dbSave('hscms_depts', allDepts);
                showLockToast('部门新增成功！', true);
            }

            closeModal('deptModal');
            loadDeptsData();
        }

        // Delete
        function deleteDept(deptId) {
            const target = allDepts.find(x => x.deptId === deptId);
            if (!target) return;

            // Rule 1: check children
            const hasChildren = allDepts.some(d => d.parentId === deptId);
            if (hasChildren) {
                showLockToast(`部门 “${target.deptName}” 包含下级子部门，禁止直接删除！`);
                return;
            }

            // Rule 2: check user linkage
            const usersList = dbGet('hscms_users', DEFAULT_USERS);
            const userLink = usersList.some(u => u.deptName === target.deptName);
            if (userLink) {
                showLockToast(`部门 “${target.deptName}” 下仍有关联系统用户存在，禁止删除！`);
                return;
            }

            if (confirm(`您确定要永久删除部门 “${target.deptName}” 吗？`)) {
                allDepts = allDepts.filter(x => x.deptId !== deptId);
                dbSave('hscms_depts', allDepts);
                showLockToast('部门已顺利删除！', true);
                loadDeptsData();
            }
        }
    </script>
</body>
</html>
